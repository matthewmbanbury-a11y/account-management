<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
</head>
<body style="font-family:monospace;font-size:11px;padding:10px;background:#0d1117;color:#e6edf3;white-space:pre-wrap;word-break:break-all;">
<div id="out">Connecting…</div>
<script>
  const getParam = k => new URLSearchParams(location.search).get(k);
  const out = document.getElementById('out');
  let attempts = 0;

  function register() {
    attempts++;
    postRobot.sendToParent('register', { title: 'Account Management' }, { timeout: 5000 })
      .then(() => run())
      .catch(() => { if (attempts < 4) setTimeout(register, 500); else out.textContent = 'No AppBridge'; });
  }

  async function run() {
    const entityId = parseInt(getParam('EntityID'), 10);
    out.textContent = `EntityID: ${entityId}\n\n`;
    const results = {};

    // Test 1: Opportunity search — does it support clientCorporation.id?
    try {
      const evt = await postRobot.sendToParent('httpPOST', {
        relativeURL: 'search/Opportunity',
        data: {
          query: `clientCorporation.id:${entityId} AND isDeleted:false`,
          fields: 'id,title,status,dateAdded,clientContact(id,firstName,lastName),owner(id,firstName,lastName),weightedRevenue,expectedFee',
          count: 3, start: 0, sort: '-dateAdded'
        }
      }, { timeout: 20000 });
      results.opportunities = evt.data;
    } catch(e) { results.opp_error = e.message; }

    // Test 2: Jobs with clientContact field — who gave us the job?
    try {
      const evt = await postRobot.sendToParent('httpPOST', {
        relativeURL: 'search/JobOrder',
        data: {
          query: `clientCorporation.id:${entityId} AND isDeleted:false`,
          fields: 'id,title,clientContact(id,firstName,lastName)',
          count: 5, start: 0, sort: '-dateAdded'
        }
      }, { timeout: 20000 });
      results.jobs_with_contact = evt.data;
    } catch(e) { results.jobs_contact_error = e.message; }

    // Test 3: Placements with fee fields for revenue
    try {
      const evt = await postRobot.sendToParent('httpPOST', {
        relativeURL: 'search/Placement',
        data: {
          query: 'id:21779 OR id:25940 OR id:25181',
          fields: 'id,status,dateBegin,dateEnd,employmentType,fee,flatFee,salary,clientBillRate,hoursPerDay,daysGuaranteed',
          count: 3, start: 0
        }
      }, { timeout: 20000 });
      results.placement_fees = evt.data;
    } catch(e) { results.placement_fees_error = e.message; }

    out.textContent += JSON.stringify(results, null, 2);
  }

  window.addEventListener('load', register);
</script>
</body>
</html>
