<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
</head>
<body style="font-family:monospace;font-size:11px;padding:10px;background:#0d1117;color:#e6edf3;white-space:pre-wrap;word-break:break-all;">
<div id="out">Connecting…</div>
<script>
  const getParam = k => new URLSearchParams(location.search).get(k);
  const out = document.getElementById('out');
  let attempts = 0;

  function register() {
    attempts++;
    postRobot.sendToParent('register', { title: 'Account Management' }, { timeout: 5000 })
      .then(() => run())
      .catch(() => { if (attempts < 4) setTimeout(register, 500); else out.textContent = 'No AppBridge'; });
  }

  async function run() {
    const entityId = parseInt(getParam('EntityID'), 10);
    out.textContent = `EntityID: ${entityId}\n\n`;

    try {
      const evt = await postRobot.sendToParent('httpPOST', {
        relativeURL: 'search/Opportunity',
        data: {
          query: `clientCorporation.id:${entityId} AND isDeleted:false`,
          fields: 'id,title,status,dateAdded,clientContact(id,firstName,lastName),owner(id,firstName,lastName)',
          count: 3, start: 0, sort: '-dateAdded'
        }
      }, { timeout: 20000 });
      out.textContent += JSON.stringify(evt.data, null, 2);
    } catch(e) { out.textContent += 'Error: ' + e.message; }
  }

  window.addEventListener('load', register);
</script>
</body>
</html>
