<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
</head>
<body style="font-family:sans-serif;padding:12px;font-size:13px;">

  <div id="out">Connecting…</div>

<script>
  const getParam = k => new URLSearchParams(location.search).get(k);
  const out = document.getElementById('out');

  let attempts = 0;
  function register() {
    attempts++;
    postRobot.sendToParent('register', { title: 'Account Management' }, { timeout: 5000 })
      .then(() => run())
      .catch(() => { if (attempts < 4) setTimeout(register, 500); else out.textContent = 'No AppBridge'; });
  }

  async function run() {
    const entityId = parseInt(getParam('EntityID'), 10);
    out.textContent = 'Registered. EntityID=' + entityId + '. Fetching…';

    try {
      const evt = await postRobot.sendToParent('httpPOST', {
        relativeURL: 'search/JobOrder',
        data: {
          query: 'clientCorporation.id:' + entityId + ' AND isDeleted:false AND isOpen:true',
          fields: 'id,title,status',
          count: 5,
          start: 0
        }
      }, { timeout: 20000 });

      // Log everything so we can see the shape
      console.log('raw evt.data:', evt.data);
      out.innerHTML = '<pre>' + JSON.stringify(evt.data, null, 2) + '</pre>';
    } catch(err) {
      out.textContent = 'Error: ' + err.message;
      console.error(err);
    }
  }

  window.addEventListener('load', register);
</script>
</body>
</html>
