<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f8fafc;--surface:#fff;--surface-soft:#fbfcff;--border:#e2e8f0;--border-strong:#d7deea;
      --text:#111827;--muted:#64748b;--muted-2:#94a3b8;--blue:#0f62d8;--blue-2:#2d7ff0;
      --green:#16a35f;--yellow:#f59e0b;--orange:#ff6b22;--red:#ef4056;--purple:#7c3aed;
      --shadow:0 1px 2px rgba(15,23,42,.05),0 10px 28px rgba(15,23,42,.045)
    }
    html,body{font-family:'Roboto',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
    /* Bullhorn already provides the main record header, so keep the custom dashboard focused on cards */
    .topbar{display:none}
    .badges{display:flex;gap:6px;flex-wrap:wrap}.badge{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:500;white-space:nowrap;border:1px solid transparent}
    .b-blue{background:#eef5ff;color:var(--blue);border-color:#cfe0ff}.b-green{background:#ecfdf3;color:var(--green);border-color:#c8f2d8}.b-yellow{background:#fff7e6;color:#b66a00;border-color:#ffe1a8}.b-red{background:#fff1f3;color:var(--red);border-color:#ffd0d7}.b-purple{background:#f3f0ff;color:var(--purple);border-color:#ddd6ff}

    .briefing{display:grid;grid-template-columns:64px 1.18fr 1.18fr 300px;gap:24px;align-items:center;margin:18px 16px 10px;padding:20px 22px;border:1px solid var(--border);border-radius:8px;background:var(--surface);box-shadow:var(--shadow)}
    .briefing-icon{width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#edf4ff,#fff);border:1px solid #cfe0ff;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.8)}
    .briefing-label{font-size:11px;color:#0f3d8a;text-transform:uppercase;letter-spacing:.045em;font-weight:700;margin-bottom:9px}.briefing-text{font-size:13px;line-height:1.7;color:var(--text);max-width:520px}
    .briefing-actions{border-left:1px solid var(--border);padding-left:24px;min-height:100px}.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}.action-item{font-size:12px;line-height:1.35;color:var(--text);display:grid;grid-template-columns:18px 1fr;gap:8px;align-items:start}.action-item:before{content:'✓';width:16px;height:16px;border:1px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:10px;font-weight:700;margin-top:1px}.action-item:nth-child(n+3):before{content:'!';border-color:var(--orange);color:var(--orange)}
    .mini-health{border-left:1px solid var(--border);padding-left:24px;display:grid;grid-template-columns:96px 1fr;gap:14px;align-items:center}.mini-health-score{width:82px;height:82px;border:9px solid #dce5ef;border-top-color:var(--green);border-right-color:var(--green);border-bottom-color:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Roboto Mono',monospace;font-size:25px;font-weight:500;color:var(--text);background:#fff}.mini-health .health-bar-outer{display:none}

    .insight-strip{margin:0 16px 10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.insight-tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;box-shadow:var(--shadow);font-size:12px;line-height:1.35;color:var(--text)}.insight-tile.warn{border-left:4px solid var(--yellow)}.insight-tile.alert{border-left:4px solid var(--red)}.insight-tile.good{border-left:4px solid var(--green)}.insight-tile.info{border-left:4px solid var(--blue)}

    .kpi-grid{margin:10px 16px 10px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.kpi-card{background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:16px 16px;display:grid;grid-template-columns:46px 1fr;gap:13px;align-items:center;min-height:112px}.kpi-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700}.kpi-purple{background:linear-gradient(145deg,#8b5cf6,#6d28d9)}.kpi-blue{background:linear-gradient(145deg,#38bdf8,#0f62d8)}.kpi-green{background:linear-gradient(145deg,#34d399,#16a35f)}.kpi-orange{background:linear-gradient(145deg,#fb923c,#ea580c)}.kpi-yellow{background:linear-gradient(145deg,#facc15,#eab308)}.kpi-red{background:linear-gradient(145deg,#fb7185,#e11d48)}.kpi-title{font-size:11px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;color:#1f2937;margin-bottom:6px;display:flex;gap:5px}.kpi-value{font-family:'Roboto Mono',monospace;font-size:23px;line-height:1;font-weight:500;color:var(--text)}.kpi-sub{font-size:11px;color:var(--muted);margin-top:7px}.kpi-delta{font-size:11px;color:var(--green);font-weight:500;margin-top:8px}

    .page{padding:0 16px 18px;display:grid;grid-template-columns:1.12fr .94fr 1.06fr;gap:10px;align-items:start}.col{display:flex;flex-direction:column;gap:10px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow)}.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;border-bottom:0;background:var(--surface)}
    .card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.035em;color:#0f172a}.card-title:after{content:'ⓘ';font-size:11px;color:var(--muted-2);margin-left:6px}.card-count{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--muted)}
    .stat-grid{display:grid;gap:1px;background:var(--border)}.sg-4{grid-template-columns:repeat(4,1fr)}.sg-3{grid-template-columns:repeat(3,1fr)}.sg-2{grid-template-columns:repeat(2,1fr)}.stat{background:var(--surface);padding:14px}.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px}.stat-value{font-family:'Roboto Mono',monospace;font-size:25px;font-weight:500;line-height:1;color:#111827}.stat-sub{font-size:11px;color:var(--muted);margin-top:7px}
    .c-green{color:var(--green)!important}.c-yellow{color:var(--yellow)!important}.c-red{color:var(--red)!important}.c-blue{color:var(--blue)!important}.c-purple{color:var(--purple)!important}
    .health{display:flex;align-items:center;gap:14px;padding:14px}.health-score{font-family:'Roboto Mono',monospace;font-size:38px;font-weight:500;line-height:1}.health-right{flex:1}.health-label{font-size:13px;font-weight:500;margin-bottom:6px}.health-bar-outer{height:7px;background:#edf1f7;border-radius:999px;overflow:hidden;margin-bottom:5px}.health-bar-inner{height:100%;border-radius:999px}.health-detail{font-size:10px;color:var(--muted)}
    .funnel{padding:4px 16px 14px;display:block}.f-step{display:grid;grid-template-columns:92px 1fr 44px;gap:10px;align-items:center;margin:10px 0}.f-step .f-val{order:3;font-family:'Roboto Mono',monospace;font-size:12px;text-align:right}.f-step .f-lbl{order:1;font-size:12px;color:var(--text);text-align:left}.f-step .f-bar{order:2;width:100%!important;height:17px!important;border-radius:4px;background:linear-gradient(90deg,var(--blue),#56a3ff)!important}.f-step:nth-of-type(5) .f-bar{background:linear-gradient(90deg,#38bdf8,var(--blue))!important}.f-step:nth-of-type(9) .f-bar{background:linear-gradient(90deg,#34d399,var(--green))!important}.f-pct{display:none}.f-arrow{display:none}
    .funnel-row{display:grid;grid-template-columns:90px 1fr 42px 62px;gap:10px;align-items:center;margin:9px 0}.funnel-label{font-size:12px;color:var(--text)}.funnel-track{height:18px;background:#eef2f7;border-radius:4px;overflow:hidden}.funnel-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),#64a7ff)}.funnel-val,.funnel-money{font-family:'Roboto Mono',monospace;font-size:11px;text-align:right;color:var(--text)}
    .ytd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}.ytd-cell{background:var(--surface);padding:12px;text-align:center}.ytd-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:7px}.ytd-vals{display:flex;justify-content:center;gap:10px;margin-bottom:3px}.ytd-val{font-family:'Roboto Mono',monospace;font-size:14px;font-weight:500}.ytd-sub{font-size:9px;color:var(--muted)}.ytd-delta{font-size:10px;margin-top:3px;font-weight:500}
    .row{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid #edf1f7}.row:last-child{border-bottom:none}.rag{width:8px;height:8px;border-radius:50%;flex-shrink:0}.rag-green{background:var(--green)}.rag-yellow{background:var(--yellow)}.rag-red{background:var(--red)}.rag-gray{background:#aeb8c5}.rag-blue{background:var(--blue)}.row-info{flex:1;min-width:0}.row-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-meta{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-right{display:flex;gap:5px;align-items:center;flex-shrink:0}.nums{display:flex;gap:10px}.num{text-align:right}.num-val{font-family:'Roboto Mono',monospace;font-size:12px;font-weight:500}.num-lbl{font-size:9px;color:var(--muted)}
    .pill{font-family:'Roboto Mono',monospace;font-size:9px;padding:3px 7px;border-radius:999px;flex-shrink:0;white-space:nowrap;border:1px solid transparent}.p-perm{background:#ecfdf3;color:var(--green);border-color:#c8f2d8}.p-contract{background:#eef5ff;color:var(--blue);border-color:#cfe0ff}.p-sow{background:#f3f0ff;color:var(--purple);border-color:#ddd6ff}.p-red{background:#fff1f3;color:var(--red);border-color:#ffd0d7}.p-yellow{background:#fff7e6;color:#b66a00;border-color:#ffe1a8}.p-gray{background:#f4f6f9;color:var(--muted);border-color:#e3e8f0}.p-green{background:#ecfdf3;color:var(--green);border-color:#c8f2d8}.p-purple{background:#f3f0ff;color:var(--purple);border-color:#ddd6ff}
    .avatar{width:24px;height:24px;border-radius:50%;background:#eef5ff;border:1px solid #cfe0ff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--blue);flex-shrink:0}.contact-pills{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
    .bar-row{display:flex;align-items:center;gap:9px;padding:8px 14px}.bar-label{font-size:11px;color:var(--muted);width:48px;flex-shrink:0}.bar-track{flex:1;height:9px;background:#eef2f7;border-radius:999px;overflow:hidden}.bar-fill{height:100%;border-radius:999px}.bar-val{font-family:'Roboto Mono',monospace;font-size:10px;font-weight:500;min-width:64px;text-align:right;flex-shrink:0}.bar-label-wide{width:120px}
    .insight-list{padding:8px 14px 12px;display:flex;flex-direction:column;gap:7px}.insight{display:flex;align-items:flex-start;gap:7px;font-size:12px;line-height:1.4}.insight-icon{flex-shrink:0;margin-top:1px}.insight.warn{color:#9a6200}.insight.alert{color:var(--red)}.insight.good{color:var(--green)}.insight.info{color:var(--muted)}
    .empty{padding:14px;font-size:12px;color:var(--muted)}.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:200px}.state-msg{font-size:12px;color:var(--muted)}.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    a{color:var(--blue);text-decoration:none;font-weight:500}a:hover{text-decoration:underline}
    @media(max-width:1400px){.briefing{grid-template-columns:56px 1fr 1fr}.mini-health{grid-column:1/-1;border-left:none;border-top:1px solid var(--border);padding:14px 0 0}.kpi-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:1100px){.briefing{grid-template-columns:56px 1fr}.briefing-actions{grid-column:1/-1;border-left:none;border-top:1px solid var(--border);padding:14px 0 0}.insight-strip{grid-template-columns:repeat(2,1fr)}.page{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"><div class="state"><div class="spinner"></div><div class="state-msg">Loading account data…</div></div></div>
<script>
  const getParam=k=>new URLSearchParams(location.search).get(k);
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const ONE_DAY=86400000;
  const now=Date.now();
  const L12M=now-365*ONE_DAY;
  const CY_START=new Date(new Date().getFullYear(),0,1).getTime();
  const PY_START=new Date(new Date().getFullYear()-1,0,1).getTime();
  const PY_END=new Date(new Date().getFullYear()-1,11,31,23,59,59).getTime();
  const fmtDate=ts=>ts?new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}):'—';
  const daysAgo=ts=>Math.round((now-ts)/ONE_DAY);
  const daysFrom=ts=>Math.round((ts-now)/ONE_DAY);
  const initials=(f,l)=>((f||'')[0]||'').toUpperCase()+((l||'')[0]||'').toUpperCase();
  const workDays=(a,b)=>{let d=0,t=Math.min(a,b);const e=Math.max(a,b);while(t<e){const w=new Date(t).getDay();if(w>0&&w<6)d++;t+=ONE_DAY;}return d;};
  const fmtGBP=n=>n>=1000000?'£'+(n/1000000).toFixed(1)+'m':n>=1000?'£'+Math.round(n/1000)+'k':n>0?'£'+Math.round(n):'£0';
  const bhUrl=()=> 'https://cls20.bullhornstaffing.com/BullhornSTAFFING';
  const recUrl=(type,id)=>`${bhUrl()}/OpenWindow.cfm?Entity=${type}&id=${id}`;
  const avgArr=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):null;

  let attempts=0;
  function register(){
    attempts++;
    postRobot.sendToParent('register',{title:'Account Management'},{timeout:5000})
      .then(()=>run()).catch(()=>{if(attempts<4)setTimeout(register,500);else show('<div class="state"><div class="state-msg">No AppBridge</div></div>');});
  }
  async function post(url,data){const evt=await postRobot.sendToParent('httpPOST',{relativeURL:url,data},{timeout:25000});return evt.data?.data?.data||[];}
  async function get(url){const evt=await postRobot.sendToParent('httpGET',{relativeURL:url},{timeout:20000});return evt.data?.data||{};}

  async function run(){
    const entityId=parseInt(getParam('EntityID'),10);
    try{
      const [allJobs,openJobs,contacts,notesRaw,opps]=await Promise.all([
        post('search/JobOrder',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,dateAdded,placements[50](id,dateAdded),clientContact(id,firstName,lastName),categories(name)',count:500,start:0}),
        post('search/JobOrder',{query:`clientCorporation.id:${entityId} AND isDeleted:false AND isOpen:true`,fields:'id,title,status,employmentType,dateAdded,owner(id,firstName,lastName),clientContact(id,firstName,lastName),submissions[100](dateAdded,status),placements[10](dateAdded)',count:200,start:0,sort:'-dateAdded'}),
        post('search/ClientContact',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,firstName,lastName,email,occupation,dateLastModified',count:200,start:0,sort:'-dateLastModified'}),
        get(`allCorpNotes?clientCorpId=${entityId}&fields=id,dateAdded,action,commentingPerson(id,firstName,lastName),personReference(id,firstName,lastName),comments&count=200&start=0&sort=-dateAdded`),
        post('search/Opportunity',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,title,status,dateAdded,clientContact(id,firstName,lastName),owner(id,firstName,lastName)',count:200,start:0,sort:'-dateAdded'})
      ]);
      const notes=notesRaw.data||[];
      const contactLastActivity={};
      notes.forEach(n=>{const pr=n.personReference;if(pr&&pr._subtype==='ClientContact')if(!contactLastActivity[pr.id]||n.dateAdded>contactLastActivity[pr.id].date)contactLastActivity[pr.id]={date:n.dateAdded,action:n.action};});
      const placIds=[];
      allJobs.forEach(j=>(j.placements?.data||[]).forEach(p=>{if(!placIds.includes(p.id))placIds.push(p.id);}));
      let placements=[];
      if(placIds.length){
        const batches=[];
        for(let i=0;i<Math.min(placIds.length,200);i+=50)batches.push(placIds.slice(i,i+50));
        const res=await Promise.all(batches.map(b=>post('search/Placement',{
          query:b.map(id=>`id:${id}`).join(' OR '),
          fields:'id,status,dateBegin,dateEnd,dateAdded,employmentType,clientBillRate,payRate,salaryUnit,hoursPerDay,fee,flatFee,customText1,candidate(id,firstName,lastName),jobOrder(id,title,dateAdded),owner(id,firstName,lastName)',
          count:50,start:0
        })));
        placements=res.flat();
      }
      render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity);
    }catch(err){show(`<div class="state"><div class="state-msg">Error: ${esc(err.message)}</div></div>`);console.error(err);}
  }

  function placRevenue(p){
    // Commercial revenue: permanent/SOW fees where present; contract margin is Bill Rate - Pay Rate.
    if(p.fee&&p.fee>0)return p.fee;
    if(p.flatFee&&p.flatFee>0)return p.flatFee;
    const margin=dailyMargin(p);
    if(margin!==null&&p.dateBegin&&p.dateEnd)return margin*workDays(p.dateBegin,p.dateEnd);
    return 0;
  }

  function dailyMargin(p){
    if(!p.clientBillRate||!p.payRate)return null;
    const unit=(p.salaryUnit||'').toLowerCase();
    if(unit.includes('hour'))return(p.clientBillRate-p.payRate)*(p.hoursPerDay||8);
    return p.clientBillRate-p.payRate; // Day Rate or default
  }

  function jobRag(j){
    const subs=j.submissions?.data||[],placs=j.placements?.data||[];
    const daysOpen=Math.round((now-j.dateAdded)/ONE_DAY);
    const subDates=subs.map(s=>s.dateAdded).sort((a,b)=>b-a);
    const daysSinceSub=subDates.length?Math.round((now-subDates[0])/ONE_DAY):daysOpen;
    const interviews=subs.filter(s=>/interview|1st|2nd|3rd|shortlist/i.test(s.status||'')).length;
    let rag='green';
    if(placs.length)rag='green';
    else if(daysOpen>60||(daysSinceSub>14&&subs.length))rag='red';
    else if(daysOpen>30||daysSinceSub>7)rag='yellow';
    return{daysOpen,subs:subs.length,interviews,placs:placs.length,daysSinceSub,rag};
  }

  const EMPLOYMENT_TYPES=['Asia Permanent','Asia Contract','Asia SoW','Europe Permanent','Europe Contract','UK Permanent','UK Contract','UK SoW','GCS SoW'];
  function employmentTypeLabel(t){const v=String(t||'').trim();if(!v)return '—';return EMPLOYMENT_TYPES.find(x=>x.toLowerCase()===v.toLowerCase())||v;}
  function typePill(t){const tl=employmentTypeLabel(t).toLowerCase();if(tl.includes('sow'))return 'p-sow';if(tl.includes('perm')||tl.includes('direct'))return 'p-perm';if(tl.includes('contract'))return 'p-contract';return 'p-gray';}
  function placPill(p){
    const st=(p.status||'').toLowerCase(),left=p.dateEnd?daysFrom(p.dateEnd):null;
    if(st==='approved'||st==='extension'){if(left===null)return{cls:'p-gray',label:'Active'};if(left<0)return{cls:'p-red',label:'Ended'};if(left<=30)return{cls:'p-yellow',label:left+'d left'};return{cls:'p-contract',label:left+'d left'};}
    if(st==='terminated')return{cls:'p-red',label:'Terminated'};
    return{cls:'p-gray',label:p.status||'—'};
  }
  function contactRag(c){if(!c.lastActivity)return 'rag-red';const d=daysAgo(c.lastActivity.date);if(d<=14)return 'rag-green';if(d<=60)return 'rag-yellow';return 'rag-red';}

  function render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity){
    const jm=openJobs.map(j=>({j,m:jobRag(j)}));
    const revAll=placements.reduce((s,p)=>s+placRevenue(p),0);
    const revL12M=placements.filter(p=>p.dateBegin&&p.dateBegin>=L12M).reduce((s,p)=>s+placRevenue(p),0);
    const revCY=placements.filter(p=>p.dateBegin&&p.dateBegin>=CY_START).reduce((s,p)=>s+placRevenue(p),0);
    const revPY=placements.filter(p=>p.dateBegin&&p.dateBegin>=PY_START&&p.dateBegin<=PY_END).reduce((s,p)=>s+placRevenue(p),0);
    const placCY=placements.filter(p=>p.dateBegin&&p.dateBegin>=CY_START).length;
    const placPY=placements.filter(p=>p.dateBegin&&p.dateBegin>=PY_START&&p.dateBegin<=PY_END).length;
    const jobsCY=allJobs.filter(j=>j.dateAdded>=CY_START).length;
    const jobsPY=allJobs.filter(j=>j.dateAdded>=PY_START&&j.dateAdded<=PY_END).length;
    const activePlacs=placements.filter(p=>{const st=(p.status||'').toLowerCase();return(st==='approved'||st==='extension')&&p.dateEnd&&p.dateEnd>now;});
    const endingSoon=activePlacs.filter(p=>daysFrom(p.dateEnd)<=30);
    const totalPlacs=placements.length;
    const fillRate=allJobs.length>0?Math.round(totalPlacs/allJobs.length*100):0;
    const ttfAll=placements.filter(p=>p.jobOrder?.dateAdded&&p.dateBegin).map(p=>Math.round((p.dateBegin-p.jobOrder.dateAdded)/ONE_DAY)).filter(d=>d>0&&d<365);
    const avgTTF=avgArr(ttfAll);
    const totSubs=jm.reduce((s,x)=>s+x.m.subs,0);
    const totInt=jm.reduce((s,x)=>s+x.m.interviews,0);
    const totPlacOpen=jm.reduce((s,x)=>s+x.m.placs,0);
    const atRisk=jm.filter(x=>x.m.rag==='red').length;
    const lastNote=notes[0]||null;
    const daysSinceContact=lastNote?daysAgo(lastNote.dateAdded):null;
    const openOpps=opps.filter(o=>!['won','lost'].includes((o.status||'').toLowerCase()));

    // Contact intelligence
    const contactJobCount={};
    allJobs.forEach(j=>{const cc=j.clientContact;if(cc?.id)contactJobCount[cc.id]=(contactJobCount[cc.id]||0)+1;});
    const enrichedContacts=contacts.map(c=>({...c,jobsRaised:contactJobCount[c.id]||0,lastActivity:contactLastActivity[c.id]||null})).sort((a,b)=>{if(b.jobsRaised!==a.jobsRaised)return b.jobsRaised-a.jobsRaised;return(b.lastActivity?.date||0)-(a.lastActivity?.date||0);});
    const contactsWithJobs=enrichedContacts.filter(c=>c.jobsRaised>0);

    const contactsGoneCold=enrichedContacts.filter(c=>c.lastActivity&&daysAgo(c.lastActivity.date)>60);
    const keyPersonRisk=enrichedContacts.filter(c=>c.jobsRaised>=3&&(!c.lastActivity||daysAgo(c.lastActivity.date)>90));

    // Leaderboard
    const consultantMap={};
    placements.forEach(p=>{if(!p.owner)return;const n=p.owner.firstName+' '+p.owner.lastName,id=p.owner.id;if(!consultantMap[id])consultantMap[id]={name:n,placs:0,rev:0,active:0};consultantMap[id].placs++;consultantMap[id].rev+=placRevenue(p);const st=(p.status||'').toLowerCase();if((st==='approved'||st==='extension')&&p.dateEnd&&p.dateEnd>now)consultantMap[id].active++;});
    const leaderboard=Object.values(consultantMap).sort((a,b)=>b.placs-a.placs).slice(0,6);

    // Whitespace
    const catJobs={},catPlacs={};

    const whitespace=Object.entries(catJobs).map(([cat,jobs])=>({cat,jobs,placs:catPlacs[cat]||0,rate:catPlacs[cat]?Math.round((catPlacs[cat]||0)/jobs*100):0})).sort((a,b)=>b.jobs-a.jobs).slice(0,8);

    // ── Trend data — by year ──
    const years={};
    allJobs.forEach(j=>{const yr=new Date(j.dateAdded).getFullYear();if(!years[yr])years[yr]={jobs:0,placs:0,ttfDays:[],margins:[],billRates:[]};years[yr].jobs++;});

    const trendYears=Object.entries(years).sort((a,b)=>a[0]-b[0]);

    // Health score
    let health=50;

    // Insights

    if(openOpps.length>0)insights.push({type:'info',icon:'🎯',msg:`${openOpps.length} open opportunit${openOpps.length>1?'ies':'y'} in pipeline`});

    const plDP=placPY>0?Math.round((placCY-placPY)/placPY*100):null;

    const maxLead=leaderboard.length?leaderboard[0].placs:1;

    // Trend bar helper — valFn returns {num, label} or null
    function trendBars(data,color,valFn){
      const entries=data.map(([yr,d])=>({yr,v:valFn(d)})).filter(e=>e.v!==null&&e.v.num>0);

    }

      <div class="topbar">

          <div class="briefing-label">Account Health</div>

          <div class="health-bar-outer" style="margin-top:8px"><div class="health-bar-inner" style="width:${health}%;background:${healthColor}"></div></div>
        </div>
      </div>

        ${insights.slice(0,4).map(i=>`<div class="insight-tile ${i.type}"><strong>${i.icon}</strong> ${esc(i.msg)}</div>`).join('')}
      </div>

        <div class="kpi-card"><div class="kpi-icon kpi-purple">£</div><div><div class="kpi-title">Gross Margin (L12M)</div><div class="kpi-value">${fmtGBP(revL12M)}</div><div class="kpi-sub">Margin = Bill Rate - Pay Rate</div>${revDP!==null?`<div class="kpi-delta">${revDP>=0?'↑':'↓'} ${Math.abs(revDP)}% vs prior year</div>`:''}</div></div>
        <div class="kpi-card"><div class="kpi-icon kpi-blue">👥</div><div><div class="kpi-title">Active Contractors</div><div class="kpi-value">${activePlacs.length}</div><div class="kpi-sub">Across active placements</div><div class="kpi-delta">${endingSoon.length?endingSoon.length+' ending soon':'Book stable'}</div></div></div>
        <div class="kpi-card"><div class="kpi-icon kpi-green">📅</div><div><div class="kpi-title">Contractors Ending 30 Days</div><div class="kpi-value">${endingSoon.length}</div><div class="kpi-sub">Renewal risk / extension focus</div><div class="kpi-delta">${fmtGBP(endingSoon.reduce((s,p)=>s+placRevenue(p),0))} margin at risk</div></div></div>
        <div class="kpi-card"><div class="kpi-icon kpi-orange">🎯</div><div><div class="kpi-title">Active Opportunities</div><div class="kpi-value">${openOpps.length}</div><div class="kpi-sub">Open opportunity pipeline</div><div class="kpi-delta">${wonOpps.length} won all time</div></div></div>
        <div class="kpi-card"><div class="kpi-icon kpi-yellow">🏆</div><div><div class="kpi-title">Placements (L12M)</div><div class="kpi-value">${placements.filter(p=>p.dateBegin&&p.dateBegin>=L12M).length}</div><div class="kpi-sub">From recent account activity</div>${plDP!==null?`<div class="kpi-delta">${plDP>=0?'↑':'↓'} ${Math.abs(plDP)}% vs prior year</div>`:''}</div></div>
        <div class="kpi-card"><div class="kpi-icon kpi-red">📄</div><div><div class="kpi-title">Lifetime Margin</div><div class="kpi-value">${fmtGBP(revAll)}</div><div class="kpi-sub">${totalPlacs} total placements</div><div class="kpi-delta">${fillRate}% fill rate</div></div></div>
      </div>
      <div class="page">

        <!-- LEFT COL -->
        <div class="col">

            <div class="card-head"><span class="card-title">Account Health</span><span class="card-count" style="color:${healthColor}">${health}/100</span></div>
            <div class="health">
              <div><div class="health-score" style="color:${healthColor}">${health}</div><div style="font-size:9px;color:var(--muted)">/100</div></div>
              <div class="health-right">
                <div class="health-label" style="color:${healthColor}">${healthLabel}</div>
                <div class="health-bar-outer"><div class="health-bar-inner" style="width:${health}%;background:${healthColor}"></div></div>
                <div class="health-detail">Margin · pipeline · contact recency · contractors · opportunities</div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Pipeline Snapshot</span></div>
            <div class="stat-grid sg-2">
              <div class="stat"><div class="stat-label">Open Jobs</div><div class="stat-value ${atRisk?'c-yellow':''}">${openJobs.length}</div><div class="stat-sub">${atRisk?`<span class="c-red">${atRisk} at risk</span>`:'all active'}</div></div>
              <div class="stat"><div class="stat-label">CVs / Interviews</div><div class="stat-value">${totSubs}</div><div class="stat-sub">${totInt} at interview</div></div>
              <div class="stat"><div class="stat-label">Contractors</div><div class="stat-value ${activePlacs.length?'c-green':'c-yellow'}">${activePlacs.length}</div><div class="stat-sub">${endingSoon.length?`<span class="c-red">${endingSoon.length} ending soon</span>`:totalPlacs+' all time'}</div></div>
              <div class="stat"><div class="stat-label">Opportunities</div><div class="stat-value c-purple">${openOpps.length}</div><div class="stat-sub">${wonOpps.length} won all time</div></div>
            </div>

          <div class="card">
            <div class="card-head"><span class="card-title">Commercial Margin</span></div>

              <div class="stat"><div class="stat-label">Gross Margin L12M</div><div class="stat-value c-green">${fmtGBP(revL12M)}</div><div class="stat-sub">Contract = bill rate - pay rate</div></div>
              <div class="stat"><div class="stat-label">Lifetime Margin</div><div class="stat-value">${fmtGBP(revAll)}</div><div class="stat-sub">${totalPlacs} placements</div></div>
              <div class="stat"><div class="stat-label">Fill Rate</div><div class="stat-value ${fillRate>=50?'c-green':fillRate>=30?'c-yellow':'c-red'}">${fillRate}%</div><div class="stat-sub">${totalPlacs} of ${allJobs.length} jobs</div></div>
              <div class="stat"><div class="stat-label">Avg Time to Fill</div><div class="stat-value">${avgTTF||'—'}</div><div class="stat-sub">${avgTTF?'days avg':''}</div></div>

              <div class="ytd-cell"><div class="ytd-label">Placements</div><div class="ytd-vals"><div class="ytd-val c-green">${placCY}</div><div class="ytd-val" style="color:var(--muted)">${placPY}</div></div><div class="ytd-sub">${cyYr} vs ${pyYr}</div>${plDP!==null?`<div class="ytd-delta ${plDP>=0?'c-green':'c-red'}">${plDP>=0?'↑':'↓'} ${Math.abs(plDP)}% YoY</div>`:''}</div>
              <div class="ytd-cell"><div class="ytd-label">Jobs Raised</div><div class="ytd-vals"><div class="ytd-val c-green">${jobsCY}</div><div class="ytd-val" style="color:var(--muted)">${jobsPY}</div></div><div class="ytd-sub">${cyYr} vs ${pyYr}</div>${jDP!==null?`<div class="ytd-delta ${jDP>=0?'c-green':'c-red'}">${jDP>=0?'↑':'↓'} ${Math.abs(jDP)}% YoY</div>`:''}</div>

            ${trendBars(trendYears,'var(--yellow)',d=>{const a=avgArr(d.ttfDays);return a?{num:a,label:a+'d avg'}:null;})}

          <div class="card">
            <div class="card-head"><span class="card-title">Open Opportunities</span><span class="card-count">${openOpps.length} open · ${opps.length} total</span></div>
            <div class="rows">${openOpps.length?openOpps.slice(0,8).map(o=>`<div class="row"><div class="rag rag-blue"></div><div class="row-info"><div class="row-title"><a href="${recUrl('Opportunity',o.id)}" target="_blank">${esc(o.title||'Untitled')}</a></div><div class="row-meta">${o.owner?o.owner.firstName+' '+o.owner.lastName:'—'} · via ${o.clientContact?o.clientContact.firstName+' '+o.clientContact.lastName:'—'} · ${fmtDate(o.dateAdded)}</div></div><span class="pill ${(o.status||'').toLowerCase()==='won'?'p-perm':(o.status||'').toLowerCase()==='lost'?'p-red':(o.status||'').toLowerCase().includes('discovery')?'p-yellow':'p-gray'}">${esc(o.status||'—')}</span></div>`).join(''):'<div class="empty">No open opportunities</div>'}</div>
          </div>
        </div>

        <!-- RIGHT COL -->
        <div class="col">
          <div class="card">
            <div class="card-head"><span class="card-title">Contacts</span><span class="card-count">${contactsWithJobs.length} raised jobs · ${contactsNeverContacted.length} never contacted · ${contactsGoneCold.length} cold</span></div>
            <div class="rows">${enrichedContacts.slice(0,12).map(c=>{const name=(c.firstName||'').trim()+' '+(c.lastName||'').trim();const la=c.lastActivity;return`<div class="row"><div class="rag ${contactRag(c)}"></div><div class="avatar">${initials(c.firstName,c.lastName)}</div><div class="row-info"><div class="row-title"><a href="${recUrl('ClientContact',c.id)}" target="_blank">${esc(name.trim())}</a>${c.jobsRaised>0?` <span style="color:var(--green);font-size:10px">· ${c.jobsRaised} job${c.jobsRaised>1?'s':''}</span>`:''}</div><div class="row-meta">${esc(c.occupation||'—')}</div></div><div class="contact-pills"><span class="pill ${c.jobsRaised>0?'p-green':'p-gray'}">${c.jobsRaised>0?c.jobsRaised+' jobs':'no jobs'}</span>${!la?'<span class="pill p-red" style="font-size:8px">never contacted</span>':daysAgo(la.date)>60?`<span class="pill p-yellow" style="font-size:8px">cold · ${daysAgo(la.date)}d</span>`:`<span class="pill p-gray" style="font-size:8px">${esc(la.action||'note')} · ${daysAgo(la.date)}d</span>`}</div></div>`;}).join('')||'<div class="empty">No contacts</div>'}</div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Consultant Leaderboard</span><span class="card-count">placements at this account</span></div>
            ${leaderboard.length?leaderboard.map((c,i)=>`<div class="bar-row"><div class="bar-label" style="width:120px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'   '} ${esc(c.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.placs/maxLead*100)}%;background:var(--blue)"></div></div><div class="bar-val" style="color:var(--blue)">${c.placs} <span style="color:var(--muted);font-size:9px">· ${fmtGBP(c.rev)}</span></div></div>`).join(''):'<div class="empty">No data</div>'}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Whitespace Analysis</span><span class="card-count">fill rate by category</span></div>
            ${whitespace.length?whitespace.map(w=>`<div class="bar-row"><div class="bar-label" style="width:120px">${esc(w.cat)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(w.rate)}%;background:${w.rate>=50?'var(--green)':w.rate>0?'var(--yellow)':'var(--red)'}"></div></div><div class="bar-val" style="color:var(--muted)">${w.placs}/${w.jobs} <span style="font-size:9px">${w.rate}%</span></div></div>`).join(''):'<div class="empty">No category data</div>'}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Recent Activity</span><span class="card-count">${notes.length} notes loaded</span></div>
            <div class="rows">${notes.slice(0,8).map(n=>{const who=n.commentingPerson?n.commentingPerson.firstName+' '+n.commentingPerson.lastName:'—';const contact=n.personReference?n.personReference.firstName+' '+n.personReference.lastName:'—';const body=(n.comments||'').replace(/<[^>]+>/g,'').trim().substring(0,70);return`<div class="row"><div class="rag rag-gray"></div><div class="row-info"><div class="row-title">${esc(n.action||'Note')} · <span style="font-weight:400;color:var(--muted)">${esc(who)} → ${esc(contact)}</span></div><div class="row-meta">${fmtDate(n.dateAdded)}${body?' — '+esc(body):''}</div></div></div>`;}).join('')||'<div class="empty">No notes</div>'}</div>
          </div>
        </div>
      </div>
    `;

    show(html);

    // AI Briefing — async after card renders
    const bp={
      healthScore:health,healthLabel,openJobs:openJobs.length,atRiskJobs:atRisk,
      jobDetails:jm.slice(0,5).map(({j,m})=>({title:j.title,daysOpen:m.daysOpen,cvs:m.subs,interviews:m.interviews,rag:m.rag})),
      activeContractors:activePlacs.length,endingSoon:endingSoon.length,
      endingSoonNames:endingSoon.slice(0,3).map(p=>p.candidate?p.candidate.firstName+' '+p.candidate.lastName+' (ends '+fmtDate(p.dateEnd)+')':'').filter(Boolean),
      revL12M:Math.round(revL12M),revCY:Math.round(revCY),revPY:Math.round(revPY),revDeltaPct:revDP,
      totalPlacements:totalPlacs,fillRate,avgTTF,openOpps:openOpps.length,
      contacts:contacts.length,contactsNeverContacted:contactsNeverContacted.length,contactsGoneCold:contactsGoneCold.length,
      keyPersonRisk:keyPersonRisk.map(c=>c.firstName+' '+c.lastName+' ('+c.jobsRaised+' jobs, '+(c.lastActivity?daysAgo(c.lastActivity.date)+'d since contact':'never contacted')+')'),
      topConsultant:leaderboard[0]?leaderboard[0].name+' ('+leaderboard[0].placs+' placements)':null,
      daysSinceLastActivity:daysSinceContact,lastNoteAction:lastNote?.action,
      whitespaceGaps:whitespace.filter(w=>w.rate===0).map(w=>w.cat).slice(0,3),
    };
    generateBriefing(bp);
  }

  async function generateBriefing(d){
    const el=document.getElementById('ai-text');
    try{
      const prompt='You are an expert recruitment account manager assistant at La Fosse Associates. Based on this account data, write a concise 3-4 sentence account summary followed by suggested actions for the account manager today. Be specific with numbers and names. Flowing prose, no bullet points.\n\nAccount data:\n- Health: '+d.healthScore+'/100 ('+d.healthLabel+')\n- Open jobs: '+d.openJobs+' ('+d.atRiskJobs+' at risk)'+(d.jobDetails.filter(j=>j.rag==='red').length?' — '+d.jobDetails.filter(j=>j.rag==='red').map(j=>j.title+' ('+j.daysOpen+'d, '+j.cvs+' CVs)').join(', '):'')+'\n- Contractors on-site: '+d.activeContractors+(d.endingSoon>0?' — '+d.endingSoon+' ending <30d: '+d.endingSoonNames.join(', '):'')+'\n- Gross Margin L12M: £'+d.revL12M.toLocaleString()+' | CY: £'+d.revCY.toLocaleString()+' vs PY: £'+d.revPY.toLocaleString()+(d.revDeltaPct!==null?' ('+d.revDeltaPct+'% YoY)':'')+'\n- Placements: '+d.totalPlacements+' | Fill rate: '+d.fillRate+'% | Avg TTF: '+(d.avgTTF||'unknown')+'d\n- Open opps: '+d.openOpps+'\n- Contacts: '+d.contacts+' total | '+d.contactsNeverContacted+' never contacted | '+d.contactsGoneCold+' cold'+(d.keyPersonRisk.length?'\n- KEY PERSON RISK: '+d.keyPersonRisk.join('; '):'')+'\n- Top consultant: '+(d.topConsultant||'unknown')+'\n- Last activity: '+(d.daysSinceLastActivity!==null?d.daysSinceLastActivity+'d ago ('+d.lastNoteAction+')':'unknown')+(d.whitespaceGaps.length?'\n- Whitespace gaps: '+d.whitespaceGaps.join(', '):'');

      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
      });
      if(!resp.ok)throw new Error('API '+resp.status);
      const result=await resp.json();
      const text=result.content?.[0]?.text||'Could not generate briefing.';
      if(el){el.style.fontStyle='normal';el.style.color='var(--text)';el.textContent=text;}
    }catch(err){
      // Fallback: generate a rule-based briefing from the data
      if(el){
        el.style.fontStyle='normal';
        el.style.color='var(--text)';
        const parts=[];
        if(d.atRiskJobs>0)parts.push(`${d.atRiskJobs} job${d.atRiskJobs>1?'s are':' is'} at risk — ${d.jobDetails.filter(j=>j.rag==='red').slice(0,2).map(j=>j.title+' ('+j.daysOpen+'d open)').join(' and ')} need immediate attention.`);
        if(d.endingSoon>0)parts.push(`${d.endingSoon} contractor${d.endingSoon>1?'s':''} ending within 30 days — ${d.endingSoonNames.slice(0,2).join(' and ')} — start extension conversations now.`);
        if(d.keyPersonRisk.length>0)parts.push(`Key person risk: ${d.keyPersonRisk.slice(0,2).join(' and ')} — high-value contacts with no recent activity.`);
        if(d.revDeltaPct!==null&&d.revDeltaPct<-10)parts.push(`Margin is down ${Math.abs(d.revDeltaPct)}% YTD vs prior year — focus on pipeline acceleration.`);
        else if(d.revDeltaPct!==null&&d.revDeltaPct>10)parts.push(`Margin up ${d.revDeltaPct}% YTD — strong account momentum to maintain.`);
        if(d.daysSinceLastActivity>14)parts.push(`No activity logged in ${d.daysSinceLastActivity} days — schedule an account touchpoint.`);
        if(d.contactsNeverContacted>10)parts.push(`${d.contactsNeverContacted} contacts have never been contacted — significant untapped relationship potential.`);
        el.textContent=parts.length?parts.join(' '):'Account is active with '+d.openJobs+' open jobs and '+d.activeContractors+' contractors on-site. Fill rate is '+d.fillRate+'% all time.';
      }
      console.warn('Claude API unavailable (likely CORS in iframe), using rule-based briefing.',err.message);
    }
  }

  function show(html){document.getElementById('root').innerHTML=html;}
  window.addEventListener('load',register);
</script>
</body>
</html>
