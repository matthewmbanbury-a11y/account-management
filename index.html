<script>
  const getParam=k=>new URLSearchParams(location.search).get(k);
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const ONE_DAY=86400000;
  const now=Date.now();
  const L12M=now-365*ONE_DAY;
  const CY_START=new Date(new Date().getFullYear(),0,1).getTime();
  const PY_START=new Date(new Date().getFullYear()-1,0,1).getTime();
  const PY_END=new Date(new Date().getFullYear()-1,11,31,23,59,59).getTime();
  const fmtDate=ts=>ts?new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}):'—';
  const daysAgo=ts=>Math.round((now-ts)/ONE_DAY);
  const daysFrom=ts=>Math.round((ts-now)/ONE_DAY);
  const initials=(f,l)=>((f||'')[0]||'').toUpperCase()+((l||'')[0]||'').toUpperCase();
  const workDays=(a,b)=>{let d=0,t=Math.min(a,b);const e=Math.max(a,b);while(t<e){const w=new Date(t).getDay();if(w>0&&w<6)d++;t+=ONE_DAY;}return d;};
  const fmtGBP=n=>n>=1000000?'£'+(n/1000000).toFixed(1)+'m':n>=1000?'£'+Math.round(n/1000)+'k':n>0?'£'+Math.round(n):'£0';
  const bhUrl=()=> 'https://cls20.bullhornstaffing.com/BullhornSTAFFING';
  const recUrl=(type,id)=>`${bhUrl()}/OpenWindow.cfm?Entity=${type}&id=${id}`;
  const fullName=o=>o?(((o.firstName||'').trim()+' '+(o.lastName||'').trim()).trim()||('ID '+o.id)):'—';
  const linkTo=(type,id,label,extra='')=>id?`<a href="${recUrl(type,id)}" target="_blank" rel="noopener" ${extra}>${esc(label||('#'+id))}</a>`:esc(label||'—');
  const userLink=o=>o?.id?linkTo('CorporateUser',o.id,fullName(o)):esc(fullName(o));
  const avgArr=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):null;

  let attempts=0;
  function register(){
    attempts++;
    postRobot.sendToParent('register',{title:'Account Management'},{timeout:5000})
      .then(()=>run()).catch(()=>{if(attempts<4)setTimeout(register,500);else show('<div class="state"><div class="state-msg">No AppBridge</div></div>');});
  }
  async function post(url,data){const evt=await postRobot.sendToParent('httpPOST',{relativeURL:url,data},{timeout:25000});return evt.data?.data?.data||[];}
  async function get(url){const evt=await postRobot.sendToParent('httpGET',{relativeURL:url},{timeout:20000});return evt.data?.data||{};}

  async function run(){
    const entityId=parseInt(getParam('EntityID'),10);
    try{
      const [allJobs,openJobs,contacts,notesRaw,opps]=await Promise.all([
        post('search/JobOrder',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,dateAdded,placements[50](id,dateAdded),clientContact(id,firstName,lastName),categories(name)',count:500,start:0}),
        post('search/JobOrder',{query:`clientCorporation.id:${entityId} AND isDeleted:false AND isOpen:true`,fields:'id,title,status,employmentType,dateAdded,owner(id,firstName,lastName),clientContact(id,firstName,lastName),submissions[100](dateAdded,status),placements[10](dateAdded)',count:200,start:0,sort:'-dateAdded'}),
        post('search/ClientContact',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,firstName,lastName,email,occupation,dateLastModified',count:200,start:0,sort:'-dateLastModified'}),
        get(`allCorpNotes?clientCorpId=${entityId}&fields=id,dateAdded,action,commentingPerson(id,firstName,lastName),personReference(id,firstName,lastName),comments&count=200&start=0&sort=-dateAdded`),
        post('search/Opportunity',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,title,status,dateAdded,clientContact(id,firstName,lastName),owner(id,firstName,lastName)',count:200,start:0,sort:'-dateAdded'})
      ]);
      const notes=notesRaw.data||[];
      const contactLastActivity={};
      notes.forEach(n=>{const pr=n.personReference;if(pr&&pr._subtype==='ClientContact')if(!contactLastActivity[pr.id]||n.dateAdded>contactLastActivity[pr.id].date)contactLastActivity[pr.id]={date:n.dateAdded,action:n.action};});
      const placIds=[];
      allJobs.forEach(j=>(j.placements?.data||[]).forEach(p=>{if(!placIds.includes(p.id))placIds.push(p.id);}));
      let placements=[];
      if(placIds.length){
        const batches=[];
        for(let i=0;i<Math.min(placIds.length,200);i+=50)batches.push(placIds.slice(i,i+50));
        const res=await Promise.all(batches.map(b=>post('search/Placement',{
          query:b.map(id=>`id:${id}`).join(' OR '),
          fields:'id,status,dateBegin,dateEnd,dateAdded,employmentType,clientBillRate,payRate,salaryUnit,hoursPerDay,fee,flatFee,customText1,customText8,candidate(id,firstName,lastName),jobOrder(id,title,dateAdded),owner(id,firstName,lastName)',
          count:50,start:0
        })));
        placements=res.flat();
      }
      render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity);
    }catch(err){show(`<div class="state"><div class="state-msg">Error: ${esc(err.message)}</div></div>`);console.error(err);}
  }

  function placRevenue(p){
    // Commercial revenue: permanent/SOW fees where present; contract margin is Bill Rate - Pay Rate.
    if(p.fee&&p.fee>0)return p.fee;
    if(p.flatFee&&p.flatFee>0)return p.flatFee;
    const margin=dailyMargin(p);
    if(margin!==null&&p.dateBegin&&p.dateEnd)return margin*workDays(p.dateBegin,p.dateEnd);
    return 0;
  }

  function dailyMargin(p){
    if(!p.clientBillRate||!p.payRate)return null;
    const unit=(p.salaryUnit||'').toLowerCase();
    if(unit.includes('hour'))return(p.clientBillRate-p.payRate)*(p.hoursPerDay||8);
    return p.clientBillRate-p.payRate; // Day Rate or default
  }

  function jobRag(j){
    const subs=j.submissions?.data||[],placs=j.placements?.data||[];
    const daysOpen=Math.round((now-j.dateAdded)/ONE_DAY);
    const subDates=subs.map(s=>s.dateAdded).sort((a,b)=>b-a);
    const daysSinceSub=subDates.length?Math.round((now-subDates[0])/ONE_DAY):daysOpen;
    const interviews=subs.filter(s=>/interview|1st|2nd|3rd|shortlist/i.test(s.status||'')).length;
    let rag='green';
    if(placs.length)rag='green';
    else if(daysOpen>60||(daysSinceSub>14&&subs.length))rag='red';
    else if(daysOpen>30||daysSinceSub>7)rag='yellow';
    return{daysOpen,subs:subs.length,interviews,placs:placs.length,daysSinceSub,rag};
  }

  const EMPLOYMENT_TYPES=['Asia Permanent','Asia Contract','Asia SoW','Europe Permanent','Europe Contract','UK Permanent','UK Contract','UK SoW','GCS SoW'];
  const LIVE_CONTRACTOR_STATUSES=['released'];
  const PRE_START_PLACEMENT_STATUSES=['ready to approve','submitted','under offer o365 initiated'];
  const INACTIVE_PLACEMENT_STATUSES=['terminated'];
  const DEAL_TYPES=['New Deal','Extension','Replacement'];
  function norm(v){return String(v||'').toLowerCase().trim();}
  function employmentTypeLabel(t){const v=String(t||'').trim();if(!v)return '—';return EMPLOYMENT_TYPES.find(x=>x.toLowerCase()===v.toLowerCase())||v;}
  function dealTypeLabel(v){const x=String(v||'').trim();if(!x)return 'Unknown';return DEAL_TYPES.find(d=>d.toLowerCase()===x.toLowerCase())||x;}
  function isPerm(p){const tl=employmentTypeLabel(p.employmentType).toLowerCase();return tl.includes('perm')||tl.includes('direct');}
  function isContract(p){const tl=employmentTypeLabel(p.employmentType).toLowerCase();return tl.includes('contract');}
  function isSoW(p){const tl=employmentTypeLabel(p.employmentType).toLowerCase();return tl.includes('sow');}
  function isNewDeal(p){return dealTypeLabel(p.customText8).toLowerCase()==='new deal';}
  function isExtension(p){return dealTypeLabel(p.customText8).toLowerCase()==='extension';}
  function isReplacement(p){return dealTypeLabel(p.customText8).toLowerCase()==='replacement';}
  function typePill(t){const tl=employmentTypeLabel(t).toLowerCase();if(tl.includes('sow'))return 'p-sow';if(tl.includes('perm')||tl.includes('direct'))return 'p-perm';if(tl.includes('contract'))return 'p-contract';return 'p-gray';}
  function dealPill(p){const d=dealTypeLabel(p.customText8).toLowerCase();if(d==='new deal')return 'p-green';if(d==='extension')return 'p-yellow';if(d==='replacement')return 'p-purple';return 'p-gray';}
  function isLiveContractor(p){const st=norm(p.status);return LIVE_CONTRACTOR_STATUSES.includes(st)&&p.dateBegin&&p.dateBegin<=now&&p.dateEnd&&p.dateEnd>=now;}
  function isPendingPlacement(p){const st=norm(p.status);return PRE_START_PLACEMENT_STATUSES.includes(st)&&(!p.dateBegin||p.dateBegin>now);}
  function isActiveOrPendingPlacement(p){const st=norm(p.status);return !INACTIVE_PLACEMENT_STATUSES.includes(st)&&(isLiveContractor(p)||PRE_START_PLACEMENT_STATUSES.includes(st));}
  function placPill(p){
    const st=norm(p.status),left=p.dateEnd?daysFrom(p.dateEnd):null;
    if(isLiveContractor(p)){if(left<=30)return{cls:'p-yellow',label:left+'d left'};return{cls:'p-contract',label:left+'d left'};}
    if(PRE_START_PLACEMENT_STATUSES.includes(st))return{cls:'p-yellow',label:p.status||'Pending'};
    if(st==='terminated')return{cls:'p-red',label:'Terminated'};
    if(left!==null&&left<0)return{cls:'p-red',label:'Ended'};
    return{cls:'p-gray',label:p.status||'—'};
  }
  function contactRag(c){if(!c.lastActivity)return 'rag-red';const d=daysAgo(c.lastActivity.date);if(d<=14)return 'rag-green';if(d<=60)return 'rag-yellow';return 'rag-red';}

  function render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity){
    const jm=openJobs.map(j=>({j,m:jobRag(j)}));
    const l12Placements=placements.filter(p=>p.dateBegin&&p.dateBegin>=L12M);
    const cyPlacements=placements.filter(p=>p.dateBegin&&p.dateBegin>=CY_START);
    const pyPlacements=placements.filter(p=>p.dateBegin&&p.dateBegin>=PY_START&&p.dateBegin<=PY_END);
    const revAll=placements.reduce((s,p)=>s+placRevenue(p),0);
    const revL12M=l12Placements.reduce((s,p)=>s+placRevenue(p),0);
    const revCY=cyPlacements.reduce((s,p)=>s+placRevenue(p),0);
    const revPY=pyPlacements.reduce((s,p)=>s+placRevenue(p),0);
    const contractMarginL12M=l12Placements.filter(isContract).reduce((s,p)=>s+placRevenue(p),0);
    const permFeesL12M=l12Placements.filter(isPerm).reduce((s,p)=>s+placRevenue(p),0);
    const sowMarginL12M=l12Placements.filter(isSoW).reduce((s,p)=>s+placRevenue(p),0);
    const contractMarginCY=cyPlacements.filter(isContract).reduce((s,p)=>s+placRevenue(p),0);
    const contractMarginPY=pyPlacements.filter(isContract).reduce((s,p)=>s+placRevenue(p),0);
    const permFeesCY=cyPlacements.filter(isPerm).reduce((s,p)=>s+placRevenue(p),0);
    const permFeesPY=pyPlacements.filter(isPerm).reduce((s,p)=>s+placRevenue(p),0);
    const sowMarginCY=cyPlacements.filter(isSoW).reduce((s,p)=>s+placRevenue(p),0);
    const sowMarginPY=pyPlacements.filter(isSoW).reduce((s,p)=>s+placRevenue(p),0);
    const newDealL12M=l12Placements.filter(isNewDeal).length;
    const extensionL12M=l12Placements.filter(isExtension).length;
    const replacementL12M=l12Placements.filter(isReplacement).length;
    const newDealCY=cyPlacements.filter(isNewDeal).length;
    const newDealPY=pyPlacements.filter(isNewDeal).length;
    const extensionCY=cyPlacements.filter(isExtension).length;
    const extensionPY=pyPlacements.filter(isExtension).length;
    const replacementCY=cyPlacements.filter(isReplacement).length;
    const replacementPY=pyPlacements.filter(isReplacement).length;
    const commercialPlacements=l12Placements.filter(p=>!isExtension(p));
    const placCY=cyPlacements.filter(p=>!isExtension(p)).length;
    const placPY=pyPlacements.filter(p=>!isExtension(p)).length;
    const jobsCY=allJobs.filter(j=>j.dateAdded>=CY_START).length;
    const jobsPY=allJobs.filter(j=>j.dateAdded>=PY_START&&j.dateAdded<=PY_END).length;
    const activePlacs=placements.filter(isLiveContractor);
    const pendingPlacs=placements.filter(isPendingPlacement);
    const endingSoon=activePlacs.filter(p=>daysFrom(p.dateEnd)<=30);
    const totalPlacs=placements.length;
    const countedPlacements=placements.filter(p=>!isExtension(p)).length;
    const fillRate=allJobs.length>0?Math.round(countedPlacements/allJobs.length*100):0;
    const ttfAll=placements.filter(p=>p.jobOrder?.dateAdded&&p.dateBegin).map(p=>Math.round((p.dateBegin-p.jobOrder.dateAdded)/ONE_DAY)).filter(d=>d>0&&d<365);
    const avgTTF=avgArr(ttfAll);
    const totSubs=jm.reduce((s,x)=>s+x.m.subs,0);
    const totInt=jm.reduce((s,x)=>s+x.m.interviews,0);
    const totPlacOpen=jm.reduce((s,x)=>s+x.m.placs,0);
    const atRisk=jm.filter(x=>x.m.rag==='red').length;
    const lastNote=notes[0]||null;
    const daysSinceContact=lastNote?daysAgo(lastNote.dateAdded):null;
    const openOpps=opps.filter(o=>!['won','lost'].includes((o.status||'').toLowerCase()));
    const wonOpps=opps.filter(o=>(o.status||'').toLowerCase()==='won');

    // Contact intelligence
    const contactJobCount={};
    allJobs.forEach(j=>{const cc=j.clientContact;if(cc?.id)contactJobCount[cc.id]=(contactJobCount[cc.id]||0)+1;});
    const enrichedContacts=contacts.map(c=>({...c,jobsRaised:contactJobCount[c.id]||0,lastActivity:contactLastActivity[c.id]||null})).sort((a,b)=>{if(b.jobsRaised!==a.jobsRaised)return b.jobsRaised-a.jobsRaised;return(b.lastActivity?.date||0)-(a.lastActivity?.date||0);});
    const contactsWithJobs=enrichedContacts.filter(c=>c.jobsRaised>0);
    const contactsNeverContacted=enrichedContacts.filter(c=>!c.lastActivity);
    const contactsGoneCold=enrichedContacts.filter(c=>c.lastActivity&&daysAgo(c.lastActivity.date)>60);
    const keyPersonRisk=enrichedContacts.filter(c=>c.jobsRaised>=3&&(!c.lastActivity||daysAgo(c.lastActivity.date)>90));

    // Leaderboard
    const consultantMap={};
    placements.forEach(p=>{if(!p.owner)return;const n=p.owner.firstName+' '+p.owner.lastName,id=p.owner.id;if(!consultantMap[id])consultantMap[id]={id,name:n,placs:0,newDeals:0,extensions:0,rev:0,active:0};consultantMap[id].placs++;if(isNewDeal(p))consultantMap[id].newDeals++;if(isExtension(p))consultantMap[id].extensions++;consultantMap[id].rev+=placRevenue(p);if(isLiveContractor(p))consultantMap[id].active++;});
    const leaderboard=Object.values(consultantMap).sort((a,b)=>b.placs-a.placs).slice(0,6);

    // Growth / whitespace by job category. Placement Type is customText8.
    const placementById={};
    placements.forEach(p=>{placementById[p.id]=p;});
    const catJobs={},catDeals={},catNewDeals={},catExtensions={},catMargin={};
    allJobs.forEach(j=>{
      const cats=j.categories?.data||[];
      cats.forEach(c=>{if(!c?.name)return;catJobs[c.name]=(catJobs[c.name]||0)+1;});
      const linked=(j.placements?.data||[]).map(x=>placementById[x.id]).filter(Boolean);
      cats.forEach(c=>{
        if(!c?.name)return;
        linked.forEach(p=>{
          if(!isExtension(p)){catDeals[c.name]=(catDeals[c.name]||0)+1;catMargin[c.name]=(catMargin[c.name]||0)+placRevenue(p);}
          if(isNewDeal(p))catNewDeals[c.name]=(catNewDeals[c.name]||0)+1;
          if(isExtension(p))catExtensions[c.name]=(catExtensions[c.name]||0)+1;
        });
      });
    });
    const whitespace=Object.entries(catJobs).map(([cat,jobs])=>{
      const deals=catDeals[cat]||0, rate=jobs?Math.round(deals/jobs*100):0;
      const opportunity=rate===0&&jobs>=2?'High':rate<25&&jobs>=4?'High':rate<40?'Medium':'Low';
      return{cat,jobs,placs:deals,newDeals:catNewDeals[cat]||0,extensions:catExtensions[cat]||0,margin:catMargin[cat]||0,rate,opportunity};
    }).sort((a,b)=>(b.opportunity==='High')-(a.opportunity==='High')||b.jobs-a.jobs).slice(0,8);

    // ── Trend data — by year ──
    const years={};
    allJobs.forEach(j=>{const yr=new Date(j.dateAdded).getFullYear();if(!years[yr])years[yr]={jobs:0,placs:0,newDeals:0,extensions:0,replacements:0,margin:0,contractMargin:0,permFees:0,sowMargin:0,ttfDays:[],margins:[],billRates:[]};years[yr].jobs++;});
    placements.filter(p=>p.dateBegin).forEach(p=>{
      const yr=new Date(p.dateBegin).getFullYear();
      if(!years[yr])years[yr]={jobs:0,placs:0,newDeals:0,extensions:0,replacements:0,margin:0,contractMargin:0,permFees:0,sowMargin:0,ttfDays:[],margins:[],billRates:[]};
      years[yr].placs++;if(isNewDeal(p))years[yr].newDeals++;if(isExtension(p))years[yr].extensions++;if(isReplacement(p))years[yr].replacements++;
      const yrRev=placRevenue(p);years[yr].margin+=yrRev;if(isContract(p))years[yr].contractMargin+=yrRev;if(isPerm(p))years[yr].permFees+=yrRev;if(isSoW(p))years[yr].sowMargin+=yrRev;
      if(p.jobOrder?.dateAdded&&p.dateBegin){const d=Math.round((p.dateBegin-p.jobOrder.dateAdded)/ONE_DAY);if(d>0&&d<365)years[yr].ttfDays.push(d);}
      const m=dailyMargin(p);if(m!==null&&m>0)years[yr].margins.push(m);
      if(p.clientBillRate)years[yr].billRates.push(p.clientBillRate);
    });
    const trendYears=Object.entries(years).sort((a,b)=>a[0]-b[0]);

    // Health score
    let health=50;
    const revDelta=revPY>0?(revCY-revPY)/revPY:0;
    health+=Math.min(20,Math.max(-20,revDelta*30));
    if(activePlacs.length>0)health+=10;if(endingSoon.length>0)health-=5;
    health-=Math.min(20,atRisk*5);
    if(daysSinceContact!==null&&daysSinceContact<=14)health+=10;else if(daysSinceContact!==null&&daysSinceContact>30)health-=10;
    if(openOpps.length>0)health+=5;if(fillRate>=50)health+=5;
    health=Math.max(0,Math.min(100,Math.round(health)));
    const healthColor=health>=70?'var(--green)':health>=40?'var(--yellow)':'var(--red)';
    const healthLabel=health>=70?'Strong account':health>=40?'Needs attention':'At risk';

    // Insights
    const insights=[];
    if(atRisk>0)insights.push({type:'alert',icon:'🔴',msg:`${atRisk} job${atRisk>1?'s':''} at risk — stalled pipeline or overdue`});
    jm.forEach(({j,m})=>{if(m.subs===0&&m.daysOpen>7)insights.push({type:'warn',icon:'⏸',msg:`${j.title} — ${m.daysOpen}d open, no CVs sent`});else if(m.subs>0&&m.daysSinceSub>10&&!m.placs)insights.push({type:'warn',icon:'📭',msg:`${j.title} — no CV in ${m.daysSinceSub} days`});});
    if(endingSoon.length>0)insights.push({type:'warn',icon:'⏰',msg:`${endingSoon.length} contractor${endingSoon.length>1?'s':''} ending within 30 days`});
    if(keyPersonRisk.length>0)insights.push({type:'alert',icon:'🚨',msg:`Key person risk: ${keyPersonRisk.map(c=>c.firstName+' '+c.lastName+' ('+c.jobsRaised+' jobs)').join(', ')}`});
    if(contactsNeverContacted.length>0)insights.push({type:'warn',icon:'👤',msg:`${contactsNeverContacted.length} contacts never contacted`});
    if(contactsGoneCold.length>0)insights.push({type:'warn',icon:'🥶',msg:`${contactsGoneCold.length} contacts gone cold — 60+ days`});
    if(revCY>revPY&&revPY>0)insights.push({type:'good',icon:'📈',msg:`Margin up ${Math.round((revCY-revPY)/revPY*100)}% YTD vs prior year`});
    else if(revCY<revPY&&revPY>0)insights.push({type:'warn',icon:'📉',msg:`Margin down ${Math.round((revPY-revCY)/revPY*100)}% YTD vs prior year`});
    if(daysSinceContact!==null&&daysSinceContact>14)insights.push({type:'warn',icon:'📞',msg:`Last activity ${daysSinceContact} days ago — needs touchpoint`});
    else if(daysSinceContact!==null&&daysSinceContact<=3)insights.push({type:'good',icon:'✅',msg:`Active account — last contact ${daysSinceContact}d ago`});
    if(openOpps.length>0)insights.push({type:'info',icon:'🎯',msg:`${openOpps.length} open opportunit${openOpps.length>1?'ies':'y'} in pipeline`});
    if(avgTTF)insights.push({type:'info',icon:'⏱',msg:`Avg ${avgTTF} days to fill at this account`});
    if(fillRate>0)insights.push({type:'info',icon:'📊',msg:`${fillRate}% fill rate — ${countedPlacements} non-extension placements from ${allJobs.length} jobs`});
    if(insights.length===0)insights.push({type:'good',icon:'✅',msg:'No issues flagged — account looks healthy'});

    const cyYr=new Date().getFullYear(),pyYr=cyYr-1;
    const revDP=revPY>0?Math.round((revCY-revPY)/revPY*100):null;
    const plDP=placPY>0?Math.round((placCY-placPY)/placPY*100):null;
    const jDP=jobsPY>0?Math.round((jobsCY-jobsPY)/jobsPY*100):null;
    const maxLead=leaderboard.length?leaderboard[0].placs:1;
    const pctDelta=(cy,py)=>py>0?Math.round((cy-py)/py*100):null;
    const deltaHtml=(cy,py)=>{const d=pctDelta(cy,py);if(d===null)return '<span class="yoy-change flat">—</span>';return `<span class="yoy-change ${d>=0?'up':'down'}">${d>=0?'↑':'↓'} ${Math.abs(d)}%</span>`;};
    const yoyMoneyRow=(label,cy,py)=>`<div class="yoy-row"><div class="yoy-label">${label}</div><div class="yoy-num">${fmtGBP(cy)}</div><div class="yoy-num">${fmtGBP(py)}</div><div>${deltaHtml(cy,py)}</div></div>`;
    const yoyCountRow=(label,cy,py)=>`<div class="yoy-row"><div class="yoy-label">${label}</div><div class="yoy-num">${cy}</div><div class="yoy-num">${py}</div><div>${deltaHtml(cy,py)}</div></div>`;
    const yoyRows=[
      yoyMoneyRow('Gross margin',revCY,revPY),
      yoyMoneyRow('Contract margin',contractMarginCY,contractMarginPY),
      yoyMoneyRow('Permanent fees',permFeesCY,permFeesPY),
      yoyMoneyRow('SoW margin',sowMarginCY,sowMarginPY),
      yoyCountRow('New deals',newDealCY,newDealPY),
      yoyCountRow('Extensions',extensionCY,extensionPY),
      yoyCountRow('Replacements',replacementCY,replacementPY),
      yoyCountRow('Jobs raised',jobsCY,jobsPY)
    ].join('');

    // Trend bar helper — valFn returns {num, label} or null
    function trendBars(data,color,valFn){
      const entries=data.map(([yr,d])=>({yr,v:valFn(d)})).filter(e=>e.v!==null&&e.v.num>0);
      if(!entries.length)return '<div class="empty">No data</div>';
      const mx=Math.max(...entries.map(e=>e.v.num));
      return entries.map(e=>`<div class="bar-row"><div class="bar-label">${e.yr}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.v.num/mx*100)}%;background:${color}"></div></div><div class="bar-val" style="color:${color}">${e.v.label}</div></div>`).join('');
    }

    const marginAtRisk30=endingSoon.reduce((s,p)=>s+placRevenue(p),0);
    const ending60=activePlacs.filter(p=>daysFrom(p.dateEnd)>30&&daysFrom(p.dateEnd)<=60);
    const ending90=activePlacs.filter(p=>daysFrom(p.dateEnd)>60&&daysFrom(p.dateEnd)<=90);
    const totalSplit=Math.max(1,contractMarginL12M+permFeesL12M+sowMarginL12M);

  async function generateBriefing(d){
    const el=document.getElementById('ai-text');
    try{
      const prompt='You are an expert recruitment account manager assistant at La Fosse Associates. Based on this account data, write a concise 3-4 sentence account summary followed by suggested actions for the account manager today. Be specific with numbers and names. Flowing prose, no bullet points.\n\nAccount data:\n- Health: '+d.healthScore+'/100 ('+d.healthLabel+')\n- Open jobs: '+d.openJobs+' ('+d.atRiskJobs+' at risk)'+(d.jobDetails.filter(j=>j.rag==='red').length?' — '+d.jobDetails.filter(j=>j.rag==='red').map(j=>j.title+' ('+j.daysOpen+'d, '+j.cvs+' CVs)').join(', '):'')+'\n- Contractors on-site: '+d.activeContractors+(d.endingSoon>0?' — '+d.endingSoon+' ending <30d: '+d.endingSoonNames.join(', '):'')+'\n- Gross Margin L12M: £'+d.revL12M.toLocaleString()+' split as Contract £'+d.contractMarginL12M.toLocaleString()+', Perm £'+d.permFeesL12M.toLocaleString()+', SoW £'+d.sowMarginL12M.toLocaleString()+' | CY: £'+d.revCY.toLocaleString()+' vs PY: £'+d.revPY.toLocaleString()+(d.revDeltaPct!==null?' ('+d.revDeltaPct+'% YoY)':'')+'\n- Placement rows: '+d.totalPlacements+' | Counted deals excluding extensions: '+d.countedPlacements+' | L12M deal split: '+d.newDealL12M+' new, '+d.extensionL12M+' extensions, '+d.replacementL12M+' replacements | Fill rate: '+d.fillRate+'% | Avg TTF: '+(d.avgTTF||'unknown')+'d\n- Open opps: '+d.openOpps+'\n- Contacts: '+d.contacts+' total | '+d.contactsNeverContacted+' never contacted | '+d.contactsGoneCold+' cold'+(d.keyPersonRisk.length?'\n- KEY PERSON RISK: '+d.keyPersonRisk.join('; '):'')+'\n- Top consultant: '+(d.topConsultant||'unknown')+'\n- Last activity: '+(d.daysSinceLastActivity!==null?d.daysSinceLastActivity+'d ago ('+d.lastNoteAction+')':'unknown')+(d.whitespaceGaps.length?'\n- Whitespace gaps: '+d.whitespaceGaps.join(', '):'');

      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
      });
      if(!resp.ok)throw new Error('API '+resp.status);
      const result=await resp.json();
      const text=result.content?.[0]?.text||'Could not generate briefing.';
      if(el){el.style.fontStyle='normal';el.style.color='var(--text)';el.textContent=text;}
    }catch(err){
      // Fallback: generate a rule-based briefing from the data
      if(el){
        el.style.fontStyle='normal';
        el.style.color='var(--text)';
        const parts=[];
        if(d.atRiskJobs>0)parts.push(`${d.atRiskJobs} job${d.atRiskJobs>1?'s are':' is'} at risk — ${d.jobDetails.filter(j=>j.rag==='red').slice(0,2).map(j=>j.title+' ('+j.daysOpen+'d open)').join(' and ')} need immediate attention.`);
        if(d.endingSoon>0)parts.push(`${d.endingSoon} contractor${d.endingSoon>1?'s':''} ending within 30 days — ${d.endingSoonNames.slice(0,2).join(' and ')} — start extension conversations now.`);
        if(d.keyPersonRisk.length>0)parts.push(`Key person risk: ${d.keyPersonRisk.slice(0,2).join(' and ')} — high-value contacts with no recent activity.`);
        if(d.revDeltaPct!==null&&d.revDeltaPct<-10)parts.push(`Margin is down ${Math.abs(d.revDeltaPct)}% YTD vs prior year — focus on pipeline acceleration.`);
        else if(d.revDeltaPct!==null&&d.revDeltaPct>10)parts.push(`Margin up ${d.revDeltaPct}% YTD — strong account momentum to maintain.`);
        if(d.daysSinceLastActivity>14)parts.push(`No activity logged in ${d.daysSinceLastActivity} days — schedule an account touchpoint.`);
        if(d.contactsNeverContacted>10)parts.push(`${d.contactsNeverContacted} contacts have never been contacted — significant untapped relationship potential.`);
        el.textContent=parts.length?parts.join(' '):'Account is active with '+d.openJobs+' open jobs and '+d.activeContractors+' contractors on-site. Fill rate is '+d.fillRate+'% excluding extensions.';
      }
      console.warn('Claude API unavailable (likely CORS in iframe), using rule-based briefing.',err.message);
    }
  }

  function show(html){document.getElementById('root').innerHTML=html;}
  window.addEventListener('load',register);
</script>
