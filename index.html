<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
</head>
<body style="font-family:monospace;font-size:11px;padding:10px;background:#0d1117;color:#e6edf3;white-space:pre-wrap;word-break:break-all;">
<div id="out">Connecting…</div>
<script>
  const getParam = k => new URLSearchParams(location.search).get(k);
  const out = document.getElementById('out');
  let attempts = 0;

  function register() {
    attempts++;
    postRobot.sendToParent('register', { title: 'Account Management' }, { timeout: 5000 })
      .then(() => run())
      .catch(() => { if (attempts < 4) setTimeout(register, 500); else out.textContent = 'No AppBridge'; });
  }

  async function run() {
    const entityId = parseInt(getParam('EntityID'), 10);
    out.textContent = `EntityID: ${entityId}\n\nStep 1: fetching all jobs to get placement IDs…\n`;

    // Step 1 — all jobs for this company, with placement IDs nested
    const evt1 = await postRobot.sendToParent('httpPOST', {
      relativeURL: 'search/JobOrder',
      data: {
        query: `clientCorporation.id:${entityId} AND isDeleted:false`,
        fields: 'id,title,placements[50](id)',
        count: 500, start: 0
      }
    }, { timeout: 20000 });

    const allJobs = evt1.data?.data?.data || [];
    const placIds = [];
    allJobs.forEach(j => (j.placements?.data||[]).forEach(p => placIds.push(p.id)));
    out.textContent += `Found ${allJobs.length} jobs, ${placIds.length} placement IDs.\n\nStep 2: fetching placement details for first 5 IDs: ${placIds.slice(0,5).join(',')}\n`;

    if (!placIds.length) { out.textContent += 'No placements found.'; return; }

    // Step 2 — fetch placements by ID OR query
    const batch = placIds.slice(0, 10);
    const idQuery = batch.map(id => `id:${id}`).join(' OR ');
    const evt2 = await postRobot.sendToParent('httpPOST', {
      relativeURL: 'search/Placement',
      data: {
        query: idQuery,
        fields: 'id,status,dateAdded,startDate,endDate,employmentType,fee,flatFee,salary,clientBillRate,candidate(id,firstName,lastName),jobOrder(id,title),owner(id,firstName,lastName)',
        count: 10, start: 0
      }
    }, { timeout: 20000 });

    out.textContent += '\nStep 2 result:\n' + JSON.stringify(evt2.data, null, 2);
  }

  window.addEventListener('load', register);
</script>
</body>
</html>
