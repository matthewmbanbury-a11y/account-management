<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#21262d;
      --text:#e6edf3; --muted:#8b949e;
      --blue:#58a6ff; --green:#3fb950; --yellow:#d29922; --red:#f78166; --purple:#bc8cff;
    }
    html,body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); font-size:13px; }

    /* Header */
    .header { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-bottom:1px solid var(--border); }
    .header-title { font-size:13px; font-weight:600; }
    .header-sub { font-size:10px; color:var(--muted); margin-top:1px; }
    .badges { display:flex; gap:5px; }
    .badge { font-family:'DM Mono',monospace; font-size:10px; padding:2px 7px; border-radius:20px; font-weight:500; }
    .badge-blue   { background:rgba(88,166,255,.15); color:var(--blue);   border:1px solid rgba(88,166,255,.3); }
    .badge-yellow { background:rgba(210,153,34,.15); color:var(--yellow); border:1px solid rgba(210,153,34,.3); }

    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--border); }
    .stat { padding:9px 12px; border-right:1px solid var(--border); }
    .stat:last-child { border-right:none; }
    .stat-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:3px; }
    .stat-value { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; }
    .stat-sub { font-size:10px; color:var(--muted); margin-top:2px; }
    .warn { color:var(--yellow); }
    .good { color:var(--green); }

    /* Job rows */
    .job { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--border); }
    .job:last-child { border-bottom:none; }
    .rag { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .rag-green  { background:var(--green);  box-shadow:0 0 5px rgba(63,185,80,.5); }
    .rag-yellow { background:var(--yellow); box-shadow:0 0 5px rgba(210,153,34,.5); }
    .rag-red    { background:var(--red);    box-shadow:0 0 5px rgba(247,129,102,.5); }
    .job-info { flex:1; min-width:0; }
    .job-title { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .job-meta  { font-size:10px; color:var(--muted); margin-top:1px; }
    .job-nums { display:flex; gap:14px; flex-shrink:0; }
    .num { text-align:right; }
    .num-val { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; }
    .num-lbl { font-size:9px; color:var(--muted); }
    .type-pill { font-family:'DM Mono',monospace; font-size:9px; padding:2px 6px; border-radius:12px; flex-shrink:0; }
    .pill-perm     { background:rgba(63,185,80,.15);  color:var(--green); border:1px solid rgba(63,185,80,.3); }
    .pill-contract { background:rgba(88,166,255,.15); color:var(--blue);  border:1px solid rgba(88,166,255,.3); }

    /* States */
    .state { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:28px 20px; min-height:140px; }
    .state-msg { font-size:11px; color:var(--muted); text-align:center; }
    .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .75s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <div id="root"><div class="state"><div class="spinner"></div><div class="state-msg">Loading…</div></div></div>

<script>
  const getParam = k => new URLSearchParams(location.search).get(k);
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const ONE_DAY = 86400000;

  let attempts = 0;
  function register() {
    attempts++;
    postRobot.sendToParent('register', { title: 'Account Management' }, { timeout: 5000 })
      .then(() => run())
      .catch(() => { if (attempts < 4) setTimeout(register, 500); else show('<div class="state"><div class="state-msg">No AppBridge connection</div></div>'); });
  }

  async function run() {
    const entityId = parseInt(getParam('EntityID'), 10);
    try {
      const evt = await postRobot.sendToParent('httpPOST', {
        relativeURL: 'search/JobOrder',
        data: {
          query: 'clientCorporation.id:' + entityId + ' AND isDeleted:false AND isOpen:true',
          fields: 'id,title,status,employmentType,dateAdded,owner(id,firstName,lastName),submissions[100](dateAdded,status),placements[50](dateAdded)',
          count: 200,
          start: 0,
          sort: '-dateAdded'
        }
      }, { timeout: 20000 });

      // Shape confirmed: evt.data.data.data = array
      const jobs = evt.data.data.data || [];
      render(jobs);
    } catch(err) {
      show('<div class="state"><div class="state-msg">Error: ' + esc(err.message) + '</div></div>');
      console.error(err);
    }
  }

  function ragFor(j) {
    const now = Date.now();
    const subs  = j.submissions?.data || [];
    const placs = j.placements?.data  || [];
    const daysOpen = Math.round((now - j.dateAdded) / ONE_DAY);
    const lastSub  = subs.length ? Math.round((now - Math.max(...subs.map(s=>s.dateAdded))) / ONE_DAY) : daysOpen;
    const interviews = subs.filter(s => /interview|1st|2nd|3rd|shortlist/i.test(s.status||'')).length;
    let rag = 'green';
    if      (placs.length)                              rag = 'green';
    else if (daysOpen > 60 || (lastSub > 14 && subs.length)) rag = 'red';
    else if (daysOpen > 30 || lastSub > 7)              rag = 'yellow';
    return { daysOpen, subs: subs.length, interviews, placs: placs.length, rag };
  }

  function render(jobs) {
    const metrics = jobs.map(j => ({ j, m: ragFor(j) }));
    const totSubs  = metrics.reduce((s,x) => s + x.m.subs, 0);
    const totInt   = metrics.reduce((s,x) => s + x.m.interviews, 0);
    const totPlac  = metrics.reduce((s,x) => s + x.m.placs, 0);
    const atRisk   = metrics.filter(x => x.m.rag === 'red').length;

    const header = `
      <div class="header">
        <div><div class="header-title">Open Jobs</div><div class="header-sub">${jobs.length} job${jobs.length!==1?'s':''} · this account</div></div>
        <div class="badges">
          <span class="badge badge-blue">${jobs.length} open</span>
          ${atRisk ? `<span class="badge badge-yellow">${atRisk} at risk</span>` : ''}
        </div>
      </div>`;

    const stats = `
      <div class="stats">
        <div class="stat"><div class="stat-label">Open Jobs</div><div class="stat-value">${jobs.length}</div></div>
        <div class="stat"><div class="stat-label">Total CVs</div><div class="stat-value">${totSubs}</div></div>
        <div class="stat"><div class="stat-label">Interviews</div><div class="stat-value">${totInt}</div></div>
        <div class="stat"><div class="stat-label">Placements</div><div class="stat-value ${totPlac?'good':''}">${totPlac}</div></div>
      </div>`;

    const rows = metrics.length ? metrics.map(({j, m}, i) => {
      const owner = j.owner ? j.owner.firstName + ' ' + j.owner.lastName : '—';
      const isPerm = /perm|direct/i.test(j.employmentType||'');
      return `
        <div class="job" style="animation-delay:${i*25}ms">
          <div class="rag rag-${m.rag}"></div>
          <div class="job-info">
            <div class="job-title">${esc(j.title||'Untitled')}</div>
            <div class="job-meta">${esc(owner)} · ${m.daysOpen}d open</div>
          </div>
          <div class="job-nums">
            <div class="num"><div class="num-val ${m.subs===0?'warn':''}">${m.subs}</div><div class="num-lbl">CVs</div></div>
            <div class="num"><div class="num-val">${m.interviews}</div><div class="num-lbl">Intrvw</div></div>
            <div class="num"><div class="num-val ${m.placs?'good':''}">${m.placs}</div><div class="num-lbl">Placed</div></div>
          </div>
          <span class="type-pill ${isPerm?'pill-perm':'pill-contract'}">${esc(j.employmentType||'—')}</span>
        </div>`;
    }).join('') : '<div class="state"><div class="state-msg">No open jobs for this account.</div></div>';

    show(header + stats + rows);
  }

  function show(html) { document.getElementById('root').innerHTML = html; }

  window.addEventListener('load', register);
</script>
</body>
</html>
