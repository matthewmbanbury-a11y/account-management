<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f78166;--purple:#bc8cff;}
    html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
    .topbar-title{font-size:15px;font-weight:600}.topbar-sub{font-size:11px;color:var(--muted)}
    .badges{display:flex;gap:5px;flex-wrap:wrap}
    .badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
    .b-blue{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
    .b-green{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
    .b-yellow{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.3)}
    .b-red{background:rgba(247,129,102,.15);color:var(--red);border:1px solid rgba(247,129,102,.3)}
    .b-purple{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.3)}
    .briefing{display:flex;gap:14px;align-items:flex-start;padding:14px 20px;border-bottom:1px solid var(--border);background:linear-gradient(to right,rgba(188,140,255,.05),transparent)}
    .briefing-icon{font-size:20px;flex-shrink:0;color:var(--purple)}
    .briefing-label{font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:5px}
    .briefing-text{font-size:12px;line-height:1.7;color:var(--text)}
    .page{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start}
    .col{display:flex;flex-direction:column;gap:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border)}
    .card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
    .card-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
    .stat-grid{display:grid;gap:1px;background:var(--border)}
    .sg-4{grid-template-columns:repeat(4,1fr)}.sg-3{grid-template-columns:repeat(3,1fr)}.sg-2{grid-template-columns:repeat(2,1fr)}
    .stat{background:var(--surface);padding:10px 12px}
    .stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
    .stat-value{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1}
    .stat-sub{font-size:10px;color:var(--muted);margin-top:3px}
    .c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-purple{color:var(--purple)}
    .health{display:flex;align-items:center;gap:14px;padding:12px}
    .health-score{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;line-height:1}
    .health-right{flex:1}
    .health-label{font-size:13px;font-weight:500;margin-bottom:5px}
    .health-bar-outer{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px}
    .health-bar-inner{height:100%;border-radius:3px}
    .health-detail{font-size:10px;color:var(--muted)}
    .funnel{display:flex;align-items:flex-end;padding:12px;gap:4px}
    .f-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
    .f-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
    .f-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
    .f-lbl{font-size:9px;color:var(--muted);text-align:center}
    .f-pct{font-size:9px;color:var(--muted)}
    .f-arrow{color:var(--border);font-size:16px;padding-bottom:22px;flex-shrink:0}
    .ytd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
    .ytd-cell{background:var(--surface);padding:10px 12px;text-align:center}
    .ytd-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
    .ytd-vals{display:flex;justify-content:center;gap:10px;margin-bottom:3px}
    .ytd-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
    .ytd-sub{font-size:9px;color:var(--muted)}
    .ytd-delta{font-size:10px;margin-top:3px;font-weight:500}
    .rows{}
    .row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border)}
    .row:last-child{border-bottom:none}
    .rag{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .rag-green{background:var(--green);box-shadow:0 0 4px rgba(63,185,80,.5)}
    .rag-yellow{background:var(--yellow);box-shadow:0 0 4px rgba(210,153,34,.5)}
    .rag-red{background:var(--red);box-shadow:0 0 4px rgba(247,129,102,.5)}
    .rag-gray{background:var(--border)}.rag-blue{background:var(--blue);box-shadow:0 0 4px rgba(88,166,255,.4)}
    .row-info{flex:1;min-width:0}
    .row-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-meta{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
    .nums{display:flex;gap:10px}
    .num{text-align:right}
    .num-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
    .num-lbl{font-size:9px;color:var(--muted)}
    .pill{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:12px;flex-shrink:0;white-space:nowrap}
    .p-perm{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
    .p-contract{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
    .p-sow{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.3)}
    .p-red{background:rgba(247,129,102,.15);color:var(--red);border:1px solid rgba(247,129,102,.3)}
    .p-yellow{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.3)}
    .p-gray{background:rgba(139,148,158,.1);color:var(--muted);border:1px solid var(--border)}
    .p-green{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
    .p-purple{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.3)}
    .avatar{width:22px;height:22px;border-radius:50%;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:var(--blue);flex-shrink:0}
    .contact-pills{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
    .bar-row{display:flex;align-items:center;gap:8px;padding:5px 12px}
    .bar-label{font-size:11px;color:var(--muted);width:44px;flex-shrink:0}
    .bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px}
    .bar-val{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;min-width:64px;text-align:right;flex-shrink:0}
    .bar-label-wide{width:120px}
    .insight-list{padding:8px 12px;display:flex;flex-direction:column;gap:5px}
    .insight{display:flex;align-items:flex-start;gap:6px;font-size:11px;line-height:1.4}
    .insight-icon{flex-shrink:0;margin-top:1px}
    .insight.warn{color:var(--yellow)}.insight.alert{color:var(--red)}.insight.good{color:var(--green)}.insight.info{color:var(--muted)}
    .empty{padding:12px;font-size:11px;color:var(--muted)}
    .state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:200px}
    .state-msg{font-size:12px;color:var(--muted)}
    .spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    a{color:inherit;text-decoration:none}a:hover{color:var(--blue);text-decoration:underline}
  </style>
</head>
<body>
<div id="root"><div class="state"><div class="spinner"></div><div class="state-msg">Loading account data…</div></div></div>
<script>
  const getParam=k=>new URLSearchParams(location.search).get(k);
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const ONE_DAY=86400000;
  const now=Date.now();
  const L12M=now-365*ONE_DAY;
  const CY_START=new Date(new Date().getFullYear(),0,1).getTime();
  const PY_START=new Date(new Date().getFullYear()-1,0,1).getTime();
  const PY_END=new Date(new Date().getFullYear()-1,11,31,23,59,59).getTime();
  const fmtDate=ts=>ts?new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}):'—';
  const daysAgo=ts=>Math.round((now-ts)/ONE_DAY);
  const daysFrom=ts=>Math.round((ts-now)/ONE_DAY);
  const initials=(f,l)=>((f||'')[0]||'').toUpperCase()+((l||'')[0]||'').toUpperCase();
  const workDays=(a,b)=>{let d=0,t=Math.min(a,b);const e=Math.max(a,b);while(t<e){const w=new Date(t).getDay();if(w>0&&w<6)d++;t+=ONE_DAY;}return d;};
  const fmtGBP=n=>n>=1000000?'£'+(n/1000000).toFixed(1)+'m':n>=1000?'£'+Math.round(n/1000)+'k':n>0?'£'+Math.round(n):'£0';
  const bhUrl=()=>{try{const u=getParam('currentBullhornUrl');return u?new URL(u).origin+'/BullhornSTAFFING':'https://cls20.bullhornstaffing.com/BullhornSTAFFING';}catch(e){return 'https://cls20.bullhornstaffing.com/BullhornSTAFFING';}};
  const recUrl=(type,id)=>`${bhUrl()}/OpenWindow.cfm?Entity=${type}&id=${id}`;
  const avgArr=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):null;

  let attempts=0;
  function register(){
    attempts++;
    postRobot.sendToParent('register',{title:'Account Management'},{timeout:5000})
      .then(()=>run()).catch(()=>{if(attempts<4)setTimeout(register,500);else show('<div class="state"><div class="state-msg">No AppBridge</div></div>');});
  }
  async function post(url,data){const evt=await postRobot.sendToParent('httpPOST',{relativeURL:url,data},{timeout:25000});return evt.data?.data?.data||[];}
  async function get(url){const evt=await postRobot.sendToParent('httpGET',{relativeURL:url},{timeout:20000});return evt.data?.data||{};}

  async function run(){
    const entityId=parseInt(getParam('EntityID'),10);
    try{
      const [allJobs,openJobs,contacts,notesRaw,opps]=await Promise.all([
        post('search/JobOrder',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,dateAdded,placements[50](id,dateAdded),clientContact(id,firstName,lastName),categories(name)',count:500,start:0}),
        post('search/JobOrder',{query:`clientCorporation.id:${entityId} AND isDeleted:false AND isOpen:true`,fields:'id,title,status,employmentType,dateAdded,owner(id,firstName,lastName),clientContact(id,firstName,lastName),submissions[100](dateAdded,status),placements[10](dateAdded)',count:200,start:0,sort:'-dateAdded'}),
        post('search/ClientContact',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,firstName,lastName,email,occupation,dateLastModified',count:200,start:0,sort:'-dateLastModified'}),
        get(`allCorpNotes?clientCorpId=${entityId}&fields=id,dateAdded,action,commentingPerson(id,firstName,lastName),personReference(id,firstName,lastName),comments&count=200&start=0&sort=-dateAdded`),
        post('search/Opportunity',{query:`clientCorporation.id:${entityId} AND isDeleted:false`,fields:'id,title,status,dateAdded,clientContact(id,firstName,lastName),owner(id,firstName,lastName)',count:200,start:0,sort:'-dateAdded'})
      ]);
      const notes=notesRaw.data||[];
      const contactLastActivity={};
      notes.forEach(n=>{const pr=n.personReference;if(pr&&pr._subtype==='ClientContact')if(!contactLastActivity[pr.id]||n.dateAdded>contactLastActivity[pr.id].date)contactLastActivity[pr.id]={date:n.dateAdded,action:n.action};});
      const placIds=[];
      allJobs.forEach(j=>(j.placements?.data||[]).forEach(p=>{if(!placIds.includes(p.id))placIds.push(p.id);}));
      let placements=[];
      if(placIds.length){
        const batches=[];
        for(let i=0;i<Math.min(placIds.length,200);i+=50)batches.push(placIds.slice(i,i+50));
        const res=await Promise.all(batches.map(b=>post('search/Placement',{
          query:b.map(id=>`id:${id}`).join(' OR '),
          fields:'id,status,dateBegin,dateEnd,dateAdded,employmentType,clientBillRate,payRate,salaryUnit,hoursPerDay,fee,flatFee,customText1,candidate(id,firstName,lastName),jobOrder(id,title,dateAdded),owner(id,firstName,lastName)',
          count:50,start:0
        })));
        placements=res.flat();
      }
      render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity);
    }catch(err){show(`<div class="state"><div class="state-msg">Error: ${esc(err.message)}</div></div>`);console.error(err);}
  }

  function placRevenue(p){
    if(p.fee&&p.fee>0)return p.fee;
    if(p.flatFee&&p.flatFee>0)return p.flatFee;
    if(p.clientBillRate&&p.dateBegin&&p.dateEnd)return p.clientBillRate*workDays(p.dateBegin,p.dateEnd);
    return 0;
  }

  function dailyMargin(p){
    if(!p.clientBillRate||!p.payRate)return null;
    const unit=(p.salaryUnit||'').toLowerCase();
    if(unit.includes('hour'))return(p.clientBillRate-p.payRate)*(p.hoursPerDay||8);
    return p.clientBillRate-p.payRate; // Day Rate or default
  }

  function jobRag(j){
    const subs=j.submissions?.data||[],placs=j.placements?.data||[];
    const daysOpen=Math.round((now-j.dateAdded)/ONE_DAY);
    const subDates=subs.map(s=>s.dateAdded).sort((a,b)=>b-a);
    const daysSinceSub=subDates.length?Math.round((now-subDates[0])/ONE_DAY):daysOpen;
    const interviews=subs.filter(s=>/interview|1st|2nd|3rd|shortlist/i.test(s.status||'')).length;
    let rag='green';
    if(placs.length)rag='green';
    else if(daysOpen>60||(daysSinceSub>14&&subs.length))rag='red';
    else if(daysOpen>30||daysSinceSub>7)rag='yellow';
    return{daysOpen,subs:subs.length,interviews,placs:placs.length,daysSinceSub,rag};
  }

  function typePill(t){const tl=(t||'').toLowerCase();if(tl.includes('perm')||tl.includes('direct'))return 'p-perm';if(tl==='sow')return 'p-sow';return 'p-contract';}
  function placPill(p){
    const st=(p.status||'').toLowerCase(),left=p.dateEnd?daysFrom(p.dateEnd):null;
    if(st==='approved'||st==='extension'){if(left===null)return{cls:'p-gray',label:'Active'};if(left<0)return{cls:'p-red',label:'Ended'};if(left<=30)return{cls:'p-yellow',label:left+'d left'};return{cls:'p-contract',label:left+'d left'};}
    if(st==='terminated')return{cls:'p-red',label:'Terminated'};
    return{cls:'p-gray',label:p.status||'—'};
  }
  function contactRag(c){if(!c.lastActivity)return 'rag-red';const d=daysAgo(c.lastActivity.date);if(d<=14)return 'rag-green';if(d<=60)return 'rag-yellow';return 'rag-red';}

  function render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity){
    const jm=openJobs.map(j=>({j,m:jobRag(j)}));
    const revAll=placements.reduce((s,p)=>s+placRevenue(p),0);
    const revL12M=placements.filter(p=>p.dateBegin&&p.dateBegin>=L12M).reduce((s,p)=>s+placRevenue(p),0);
    const revCY=placements.filter(p=>p.dateBegin&&p.dateBegin>=CY_START).reduce((s,p)=>s+placRevenue(p),0);
    const revPY=placements.filter(p=>p.dateBegin&&p.dateBegin>=PY_START&&p.dateBegin<=PY_END).reduce((s,p)=>s+placRevenue(p),0);
    const placCY=placements.filter(p=>p.dateBegin&&p.dateBegin>=CY_START).length;
    const placPY=placements.filter(p=>p.dateBegin&&p.dateBegin>=PY_START&&p.dateBegin<=PY_END).length;
    const jobsCY=allJobs.filter(j=>j.dateAdded>=CY_START).length;
    const jobsPY=allJobs.filter(j=>j.dateAdded>=PY_START&&j.dateAdded<=PY_END).length;
    const activePlacs=placements.filter(p=>{const st=(p.status||'').toLowerCase();return(st==='approved'||st==='extension')&&p.dateEnd&&p.dateEnd>now;});
    const endingSoon=activePlacs.filter(p=>daysFrom(p.dateEnd)<=30);
    const totalPlacs=placements.length;
    const fillRate=allJobs.length>0?Math.round(totalPlacs/allJobs.length*100):0;
    const ttfAll=placements.filter(p=>p.jobOrder?.dateAdded&&p.dateBegin).map(p=>Math.round((p.dateBegin-p.jobOrder.dateAdded)/ONE_DAY)).filter(d=>d>0&&d<365);
    const avgTTF=avgArr(ttfAll);
    const totSubs=jm.reduce((s,x)=>s+x.m.subs,0);
    const totInt=jm.reduce((s,x)=>s+x.m.interviews,0);
    const totPlacOpen=jm.reduce((s,x)=>s+x.m.placs,0);
    const atRisk=jm.filter(x=>x.m.rag==='red').length;
    const lastNote=notes[0]||null;
    const daysSinceContact=lastNote?daysAgo(lastNote.dateAdded):null;
    const openOpps=opps.filter(o=>!['won','lost'].includes((o.status||'').toLowerCase()));
    const wonOpps=opps.filter(o=>(o.status||'').toLowerCase()==='won');

    // Contact intelligence
    const contactJobCount={};
    allJobs.forEach(j=>{const cc=j.clientContact;if(cc?.id)contactJobCount[cc.id]=(contactJobCount[cc.id]||0)+1;});
    const enrichedContacts=contacts.map(c=>({...c,jobsRaised:contactJobCount[c.id]||0,lastActivity:contactLastActivity[c.id]||null})).sort((a,b)=>{if(b.jobsRaised!==a.jobsRaised)return b.jobsRaised-a.jobsRaised;return(b.lastActivity?.date||0)-(a.lastActivity?.date||0);});
    const contactsWithJobs=enrichedContacts.filter(c=>c.jobsRaised>0);
    const contactsNeverContacted=enrichedContacts.filter(c=>!c.lastActivity);
    const contactsGoneCold=enrichedContacts.filter(c=>c.lastActivity&&daysAgo(c.lastActivity.date)>60);
    const keyPersonRisk=enrichedContacts.filter(c=>c.jobsRaised>=3&&(!c.lastActivity||daysAgo(c.lastActivity.date)>90));

    // Leaderboard
    const consultantMap={};
    placements.forEach(p=>{if(!p.owner)return;const n=p.owner.firstName+' '+p.owner.lastName,id=p.owner.id;if(!consultantMap[id])consultantMap[id]={name:n,placs:0,rev:0,active:0};consultantMap[id].placs++;consultantMap[id].rev+=placRevenue(p);const st=(p.status||'').toLowerCase();if((st==='approved'||st==='extension')&&p.dateEnd&&p.dateEnd>now)consultantMap[id].active++;});
    const leaderboard=Object.values(consultantMap).sort((a,b)=>b.placs-a.placs).slice(0,6);

    // Whitespace
    const catJobs={},catPlacs={};
    allJobs.forEach(j=>{(j.categories?.data||[]).forEach(c=>{catJobs[c.name]=(catJobs[c.name]||0)+1;if((j.placements?.data||[]).length>0)catPlacs[c.name]=(catPlacs[c.name]||0)+1;});});
    const whitespace=Object.entries(catJobs).map(([cat,jobs])=>({cat,jobs,placs:catPlacs[cat]||0,rate:catPlacs[cat]?Math.round((catPlacs[cat]||0)/jobs*100):0})).sort((a,b)=>b.jobs-a.jobs).slice(0,8);

    // ── Trend data — by year ──
    const years={};
    allJobs.forEach(j=>{const yr=new Date(j.dateAdded).getFullYear();if(!years[yr])years[yr]={jobs:0,placs:0,ttfDays:[],margins:[],billRates:[]};years[yr].jobs++;});
    placements.filter(p=>p.dateBegin).forEach(p=>{
      const yr=new Date(p.dateBegin).getFullYear();
      if(!years[yr])years[yr]={jobs:0,placs:0,ttfDays:[],margins:[],billRates:[]};
      years[yr].placs++;
      if(p.jobOrder?.dateAdded&&p.dateBegin){const d=Math.round((p.dateBegin-p.jobOrder.dateAdded)/ONE_DAY);if(d>0&&d<365)years[yr].ttfDays.push(d);}
      const m=dailyMargin(p);if(m!==null&&m>0)years[yr].margins.push(m);
      if(p.clientBillRate)years[yr].billRates.push(p.clientBillRate);
    });
    const trendYears=Object.entries(years).sort((a,b)=>a[0]-b[0]);

    // Health score
    let health=50;
    const revDelta=revPY>0?(revCY-revPY)/revPY:0;
    health+=Math.min(20,Math.max(-20,revDelta*30));
    if(activePlacs.length>0)health+=10;if(endingSoon.length>0)health-=5;
    health-=Math.min(20,atRisk*5);
    if(daysSinceContact!==null&&daysSinceContact<=14)health+=10;else if(daysSinceContact!==null&&daysSinceContact>30)health-=10;
    if(openOpps.length>0)health+=5;if(fillRate>=50)health+=5;
    health=Math.max(0,Math.min(100,Math.round(health)));
    const healthColor=health>=70?'var(--green)':health>=40?'var(--yellow)':'var(--red)';
    const healthLabel=health>=70?'Strong account':health>=40?'Needs attention':'At risk';

    // Insights
    const insights=[];
    if(atRisk>0)insights.push({type:'alert',icon:'🔴',msg:`${atRisk} job${atRisk>1?'s':''} at risk — stalled pipeline or overdue`});
    jm.forEach(({j,m})=>{if(m.subs===0&&m.daysOpen>7)insights.push({type:'warn',icon:'⏸',msg:`${j.title} — ${m.daysOpen}d open, no CVs sent`});else if(m.subs>0&&m.daysSinceSub>10&&!m.placs)insights.push({type:'warn',icon:'📭',msg:`${j.title} — no CV in ${m.daysSinceSub} days`});});
    if(endingSoon.length>0)insights.push({type:'warn',icon:'⏰',msg:`${endingSoon.length} contractor${endingSoon.length>1?'s':''} ending within 30 days`});
    if(keyPersonRisk.length>0)insights.push({type:'alert',icon:'🚨',msg:`Key person risk: ${keyPersonRisk.map(c=>c.firstName+' '+c.lastName+' ('+c.jobsRaised+' jobs)').join(', ')}`});
    if(contactsNeverContacted.length>0)insights.push({type:'warn',icon:'👤',msg:`${contactsNeverContacted.length} contacts never contacted`});
    if(contactsGoneCold.length>0)insights.push({type:'warn',icon:'🥶',msg:`${contactsGoneCold.length} contacts gone cold — 60+ days`});
    if(revCY>revPY&&revPY>0)insights.push({type:'good',icon:'📈',msg:`Revenue up ${Math.round((revCY-revPY)/revPY*100)}% YTD vs prior year`});
    else if(revCY<revPY&&revPY>0)insights.push({type:'warn',icon:'📉',msg:`Revenue down ${Math.round((revPY-revCY)/revPY*100)}% YTD vs prior year`});
    if(daysSinceContact!==null&&daysSinceContact>14)insights.push({type:'warn',icon:'📞',msg:`Last activity ${daysSinceContact} days ago — needs touchpoint`});
    else if(daysSinceContact!==null&&daysSinceContact<=3)insights.push({type:'good',icon:'✅',msg:`Active account — last contact ${daysSinceContact}d ago`});
    if(openOpps.length>0)insights.push({type:'info',icon:'🎯',msg:`${openOpps.length} open opportunit${openOpps.length>1?'ies':'y'} in pipeline`});
    if(avgTTF)insights.push({type:'info',icon:'⏱',msg:`Avg ${avgTTF} days to fill at this account`});
    if(fillRate>0)insights.push({type:'info',icon:'📊',msg:`${fillRate}% all-time fill rate — ${totalPlacs} placements from ${allJobs.length} jobs`});
    if(insights.length===0)insights.push({type:'good',icon:'✅',msg:'No issues flagged — account looks healthy'});

    const cyYr=new Date().getFullYear(),pyYr=cyYr-1;
    const revDP=revPY>0?Math.round((revCY-revPY)/revPY*100):null;
    const plDP=placPY>0?Math.round((placCY-placPY)/placPY*100):null;
    const jDP=jobsPY>0?Math.round((jobsCY-jobsPY)/jobsPY*100):null;
    const maxLead=leaderboard.length?leaderboard[0].placs:1;

    // Trend bar helper — valFn returns {num, label} or null
    function trendBars(data,color,valFn){
      const entries=data.map(([yr,d])=>({yr,v:valFn(d)})).filter(e=>e.v!==null&&e.v.num>0);
      if(!entries.length)return '<div class="empty">No data</div>';
      const mx=Math.max(...entries.map(e=>e.v.num));
      return entries.map(e=>`<div class="bar-row"><div class="bar-label">${e.yr}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.v.num/mx*100)}%;background:${color}"></div></div><div class="bar-val" style="color:${color}">${e.v.label}</div></div>`).join('');
    }

    const html=`
      <div class="topbar">
        <div>
          <div class="topbar-title">Account Management</div>
          <div class="topbar-sub">${openJobs.length} open jobs · ${activePlacs.length} contractors on-site · ${contacts.length} contacts · ${openOpps.length} opportunities · last activity ${daysSinceContact!==null?daysSinceContact+'d ago':'unknown'}</div>
        </div>
        <div class="badges">
          ${openJobs.length?`<span class="badge b-blue">${openJobs.length} open</span>`:''}
          ${atRisk?`<span class="badge b-red">${atRisk} at risk</span>`:''}
          ${activePlacs.length?`<span class="badge b-green">${activePlacs.length} on-site</span>`:''}
          ${endingSoon.length?`<span class="badge b-yellow">${endingSoon.length} ending soon</span>`:''}
          ${openOpps.length?`<span class="badge b-purple">${openOpps.length} opps</span>`:''}
        </div>
      </div>
      <div class="briefing">
        <div class="briefing-icon">✦</div>
        <div style="flex:1">
          <div class="briefing-label">AI Account Briefing</div>
          <div class="briefing-text" id="ai-text" style="color:var(--muted);font-style:italic">Generating briefing…</div>
        </div>
      </div>
      <div class="page">

        <!-- LEFT COL -->
        <div class="col">
          <div class="card">
            <div class="card-head"><span class="card-title">Account Health</span><span class="card-count" style="color:${healthColor}">${health}/100</span></div>
            <div class="health">
              <div><div class="health-score" style="color:${healthColor}">${health}</div><div style="font-size:9px;color:var(--muted)">/100</div></div>
              <div class="health-right">
                <div class="health-label" style="color:${healthColor}">${healthLabel}</div>
                <div class="health-bar-outer"><div class="health-bar-inner" style="width:${health}%;background:${healthColor}"></div></div>
                <div class="health-detail">Revenue · pipeline · contact recency · contractors · opportunities</div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Pipeline Snapshot</span></div>
            <div class="stat-grid sg-2">
              <div class="stat"><div class="stat-label">Open Jobs</div><div class="stat-value ${atRisk?'c-yellow':''}">${openJobs.length}</div><div class="stat-sub">${atRisk?`<span class="c-red">${atRisk} at risk</span>`:'all active'}</div></div>
              <div class="stat"><div class="stat-label">CVs / Interviews</div><div class="stat-value">${totSubs}</div><div class="stat-sub">${totInt} at interview</div></div>
              <div class="stat"><div class="stat-label">Contractors</div><div class="stat-value ${activePlacs.length?'c-green':'c-yellow'}">${activePlacs.length}</div><div class="stat-sub">${endingSoon.length?`<span class="c-red">${endingSoon.length} ending soon</span>`:totalPlacs+' all time'}</div></div>
              <div class="stat"><div class="stat-label">Opportunities</div><div class="stat-value c-purple">${openOpps.length}</div><div class="stat-sub">${wonOpps.length} won all time</div></div>
            </div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Revenue</span></div>
            <div class="stat-grid sg-2">
              <div class="stat"><div class="stat-label">L12 Months</div><div class="stat-value c-green">${fmtGBP(revL12M)}</div><div class="stat-sub">bill rate basis</div></div>
              <div class="stat"><div class="stat-label">Lifetime</div><div class="stat-value">${fmtGBP(revAll)}</div><div class="stat-sub">${totalPlacs} placements</div></div>
              <div class="stat"><div class="stat-label">Fill Rate</div><div class="stat-value ${fillRate>=50?'c-green':fillRate>=30?'c-yellow':'c-red'}">${fillRate}%</div><div class="stat-sub">${totalPlacs} of ${allJobs.length} jobs</div></div>
              <div class="stat"><div class="stat-label">Avg Time to Fill</div><div class="stat-value">${avgTTF||'—'}</div><div class="stat-sub">${avgTTF?'days avg':''}</div></div>
            </div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">YTD vs Prior Year</span></div>
            <div class="ytd-grid">
              <div class="ytd-cell"><div class="ytd-label">Revenue</div><div class="ytd-vals"><div class="ytd-val c-green">${fmtGBP(revCY)}</div><div class="ytd-val" style="color:var(--muted)">${fmtGBP(revPY)}</div></div><div class="ytd-sub">${cyYr} vs ${pyYr}</div>${revDP!==null?`<div class="ytd-delta ${revDP>=0?'c-green':'c-red'}">${revDP>=0?'↑':'↓'} ${Math.abs(revDP)}% YoY</div>`:''}</div>
              <div class="ytd-cell"><div class="ytd-label">Placements</div><div class="ytd-vals"><div class="ytd-val c-green">${placCY}</div><div class="ytd-val" style="color:var(--muted)">${placPY}</div></div><div class="ytd-sub">${cyYr} vs ${pyYr}</div>${plDP!==null?`<div class="ytd-delta ${plDP>=0?'c-green':'c-red'}">${plDP>=0?'↑':'↓'} ${Math.abs(plDP)}% YoY</div>`:''}</div>
              <div class="ytd-cell"><div class="ytd-label">Jobs Raised</div><div class="ytd-vals"><div class="ytd-val c-green">${jobsCY}</div><div class="ytd-val" style="color:var(--muted)">${jobsPY}</div></div><div class="ytd-sub">${cyYr} vs ${pyYr}</div>${jDP!==null?`<div class="ytd-delta ${jDP>=0?'c-green':'c-red'}">${jDP>=0?'↑':'↓'} ${Math.abs(jDP)}% YoY</div>`:''}</div>
            </div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Insights</span><span class="card-count">${insights.length}</span></div>
            <div class="insight-list">${insights.map(i=>`<div class="insight ${i.type}"><span class="insight-icon">${i.icon}</span><span>${esc(i.msg)}</span></div>`).join('')}</div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Bill Rate Trend</span><span class="card-count">avg £/day by year</span></div>
            ${trendBars(trendYears,'var(--purple)',d=>{const a=avgArr(d.billRates);return a?{num:a,label:'£'+a+'/day'}:null;})}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Margin Trend</span><span class="card-count">avg £/day margin by year</span></div>
            ${trendBars(trendYears,'var(--green)',d=>{const a=avgArr(d.margins);return a?{num:Math.round(a),label:'£'+Math.round(a)+'/day'}:null;})}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Jobs Added Trend</span><span class="card-count">vacancies raised per year</span></div>
            ${trendBars(trendYears,'var(--blue)',d=>d.jobs>0?{num:d.jobs,label:d.jobs+' jobs'}:null)}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Fill Rate Trend</span><span class="card-count">placements per year</span></div>
            ${(()=>{const mx=Math.max(...trendYears.map(([yr,d])=>d.placs),1);return trendYears.map(([yr,d])=>{if(!d.placs&&!d.jobs)return'';const rate=d.jobs>0?Math.round(d.placs/d.jobs*100):0;const col=rate>=50?'var(--green)':rate>0?'var(--yellow)':'var(--red)';return`<div class="bar-row"><div class="bar-label">${yr}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.placs/mx*100)}%;background:${col}"></div></div><div class="bar-val" style="color:${col}">${d.placs} plac <span style="font-size:9px">${rate}%</span></div></div>`;}).join('')||'<div class="empty">No data</div>';})()}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Time to Fill Trend</span><span class="card-count">avg days job → placement</span></div>
            ${trendBars(trendYears,'var(--yellow)',d=>{const a=avgArr(d.ttfDays);return a?{num:a,label:a+'d avg'}:null;})}
          </div>
        </div>

        <!-- MIDDLE COL -->
        <div class="col">
          <div class="card">
            <div class="card-head"><span class="card-title">Pipeline Funnel</span><span class="card-count">open jobs only</span></div>
            <div class="funnel">
              <div class="f-step"><div class="f-val">${totSubs}</div><div class="f-bar" style="background:rgba(88,166,255,.4);height:${Math.max(8,totSubs?60:8)}px"></div><div class="f-lbl">CVs Sent</div></div>
              <div class="f-arrow">›</div>
              <div class="f-step"><div class="f-val">${totInt}</div><div class="f-bar" style="background:rgba(210,153,34,.5);height:${Math.max(4,totSubs?Math.round(totInt/Math.max(totSubs,1)*60):4)}px"></div><div class="f-lbl">Interviews</div><div class="f-pct">${totSubs?Math.round(totInt/totSubs*100)+'%':''}</div></div>
              <div class="f-arrow">›</div>
              <div class="f-step"><div class="f-val">${totPlacOpen}</div><div class="f-bar" style="background:rgba(63,185,80,.5);height:${Math.max(4,totSubs?Math.round(totPlacOpen/Math.max(totSubs,1)*60):4)}px"></div><div class="f-lbl">Placed</div><div class="f-pct">${totSubs?Math.round(totPlacOpen/totSubs*100)+'%':''}</div></div>
            </div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Open Jobs</span><span class="card-count">${openJobs.length}</span></div>
            <div class="rows">${jm.length?jm.map(({j,m})=>{const owner=j.owner?j.owner.firstName+' '+j.owner.lastName:'—';const cc=j.clientContact?j.clientContact.firstName+' '+j.clientContact.lastName:'no contact';return`<div class="row"><div class="rag rag-${m.rag}"></div><div class="row-info"><div class="row-title"><a href="${recUrl('JobOrder',j.id)}" target="_blank">${esc(j.title||'Untitled')}</a></div><div class="row-meta">${esc(owner)} · via ${esc(cc)} · ${m.daysOpen}d · ${m.subs>0?'last CV '+m.daysSinceSub+'d ago':'no CVs'}</div></div><div class="row-right"><div class="nums"><div class="num"><div class="num-val ${m.subs===0?'c-red':''}">${m.subs}</div><div class="num-lbl">CVs</div></div><div class="num"><div class="num-val">${m.interviews}</div><div class="num-lbl">Int</div></div><div class="num"><div class="num-val ${m.placs?'c-green':''}">${m.placs}</div><div class="num-lbl">Plac</div></div></div><span class="pill ${typePill(j.employmentType)}">${esc(j.employmentType||'—')}</span></div></div>`;}).join(''):'<div class="empty">No open jobs</div>'}</div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Active Contractors</span><span class="card-count">${activePlacs.length} active · ${totalPlacs} all time</span></div>
            <div class="rows">${activePlacs.length?activePlacs.sort((a,b)=>a.dateEnd-b.dateEnd).slice(0,12).map(p=>{const name=p.candidate?p.candidate.firstName+' '+p.candidate.lastName:'—';const pp=placPill(p);const left=p.dateEnd?daysFrom(p.dateEnd):null;const ragC=left===null?'rag-gray':left<0?'rag-red':left<=30?'rag-yellow':'rag-green';const margin=dailyMargin(p);return`<div class="row"><div class="rag ${ragC}"></div><div class="row-info"><div class="row-title">${p.candidate?.id?`<a href="${recUrl('Candidate',p.candidate.id)}" target="_blank">${esc(name)}</a>`:esc(name)}</div><div class="row-meta">${esc(p.jobOrder?.title||'—')} · ${p.owner?p.owner.firstName+' '+p.owner.lastName:'—'} · £${p.clientBillRate||0}/day${margin!==null?' · £'+Math.round(margin)+' margin':''} · ends ${fmtDate(p.dateEnd)}</div></div><div class="row-right">${p.customText1?`<span class="pill p-gray">${esc(p.customText1)}</span>`:''}<span class="pill ${typePill(p.employmentType)}">${esc(p.employmentType||'—')}</span><span class="pill ${pp.cls}">${pp.label}</span></div></div>`;}).join(''):'<div class="empty">No active contractors</div>'}</div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Open Opportunities</span><span class="card-count">${openOpps.length} open · ${opps.length} total</span></div>
            <div class="rows">${openOpps.length?openOpps.slice(0,8).map(o=>`<div class="row"><div class="rag rag-blue"></div><div class="row-info"><div class="row-title"><a href="${recUrl('Opportunity',o.id)}" target="_blank">${esc(o.title||'Untitled')}</a></div><div class="row-meta">${o.owner?o.owner.firstName+' '+o.owner.lastName:'—'} · via ${o.clientContact?o.clientContact.firstName+' '+o.clientContact.lastName:'—'} · ${fmtDate(o.dateAdded)}</div></div><span class="pill ${(o.status||'').toLowerCase()==='won'?'p-perm':(o.status||'').toLowerCase()==='lost'?'p-red':(o.status||'').toLowerCase().includes('discovery')?'p-yellow':'p-gray'}">${esc(o.status||'—')}</span></div>`).join(''):'<div class="empty">No open opportunities</div>'}</div>
          </div>
        </div>

        <!-- RIGHT COL -->
        <div class="col">
          <div class="card">
            <div class="card-head"><span class="card-title">Contacts</span><span class="card-count">${contactsWithJobs.length} raised jobs · ${contactsNeverContacted.length} never contacted · ${contactsGoneCold.length} cold</span></div>
            <div class="rows">${enrichedContacts.slice(0,12).map(c=>{const name=(c.firstName||'').trim()+' '+(c.lastName||'').trim();const la=c.lastActivity;return`<div class="row"><div class="rag ${contactRag(c)}"></div><div class="avatar">${initials(c.firstName,c.lastName)}</div><div class="row-info"><div class="row-title"><a href="${recUrl('ClientContact',c.id)}" target="_blank">${esc(name.trim())}</a>${c.jobsRaised>0?` <span style="color:var(--green);font-size:10px">· ${c.jobsRaised} job${c.jobsRaised>1?'s':''}</span>`:''}</div><div class="row-meta">${esc(c.occupation||'—')}</div></div><div class="contact-pills"><span class="pill ${c.jobsRaised>0?'p-green':'p-gray'}">${c.jobsRaised>0?c.jobsRaised+' jobs':'no jobs'}</span>${!la?'<span class="pill p-red" style="font-size:8px">never contacted</span>':daysAgo(la.date)>60?`<span class="pill p-yellow" style="font-size:8px">cold · ${daysAgo(la.date)}d</span>`:`<span class="pill p-gray" style="font-size:8px">${esc(la.action||'note')} · ${daysAgo(la.date)}d</span>`}</div></div>`;}).join('')||'<div class="empty">No contacts</div>'}</div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Consultant Leaderboard</span><span class="card-count">placements at this account</span></div>
            ${leaderboard.length?leaderboard.map((c,i)=>`<div class="bar-row"><div class="bar-label" style="width:120px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'   '} ${esc(c.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.placs/maxLead*100)}%;background:var(--blue)"></div></div><div class="bar-val" style="color:var(--blue)">${c.placs} <span style="color:var(--muted);font-size:9px">· ${fmtGBP(c.rev)}</span></div></div>`).join(''):'<div class="empty">No data</div>'}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Whitespace Analysis</span><span class="card-count">fill rate by category</span></div>
            ${whitespace.length?whitespace.map(w=>`<div class="bar-row"><div class="bar-label" style="width:120px">${esc(w.cat)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(w.rate)}%;background:${w.rate>=50?'var(--green)':w.rate>0?'var(--yellow)':'var(--red)'}"></div></div><div class="bar-val" style="color:var(--muted)">${w.placs}/${w.jobs} <span style="font-size:9px">${w.rate}%</span></div></div>`).join(''):'<div class="empty">No category data</div>'}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Recent Activity</span><span class="card-count">${notes.length} notes loaded</span></div>
            <div class="rows">${notes.slice(0,8).map(n=>{const who=n.commentingPerson?n.commentingPerson.firstName+' '+n.commentingPerson.lastName:'—';const contact=n.personReference?n.personReference.firstName+' '+n.personReference.lastName:'—';const body=(n.comments||'').replace(/<[^>]+>/g,'').trim().substring(0,70);return`<div class="row"><div class="rag rag-gray"></div><div class="row-info"><div class="row-title">${esc(n.action||'Note')} · <span style="font-weight:400;color:var(--muted)">${esc(who)} → ${esc(contact)}</span></div><div class="row-meta">${fmtDate(n.dateAdded)}${body?' — '+esc(body):''}</div></div></div>`;}).join('')||'<div class="empty">No notes</div>'}</div>
          </div>
        </div>
      </div>
    `;

    show(html);

    // AI Briefing — async after card renders
    const bp={
      healthScore:health,healthLabel,openJobs:openJobs.length,atRiskJobs:atRisk,
      jobDetails:jm.slice(0,5).map(({j,m})=>({title:j.title,daysOpen:m.daysOpen,cvs:m.subs,interviews:m.interviews,rag:m.rag})),
      activeContractors:activePlacs.length,endingSoon:endingSoon.length,
      endingSoonNames:endingSoon.slice(0,3).map(p=>p.candidate?p.candidate.firstName+' '+p.candidate.lastName+' (ends '+fmtDate(p.dateEnd)+')':'').filter(Boolean),
      revL12M:Math.round(revL12M),revCY:Math.round(revCY),revPY:Math.round(revPY),revDeltaPct:revDP,
      totalPlacements:totalPlacs,fillRate,avgTTF,openOpps:openOpps.length,
      contacts:contacts.length,contactsNeverContacted:contactsNeverContacted.length,contactsGoneCold:contactsGoneCold.length,
      keyPersonRisk:keyPersonRisk.map(c=>c.firstName+' '+c.lastName+' ('+c.jobsRaised+' jobs, '+(c.lastActivity?daysAgo(c.lastActivity.date)+'d since contact':'never contacted')+')'),
      topConsultant:leaderboard[0]?leaderboard[0].name+' ('+leaderboard[0].placs+' placements)':null,
      daysSinceLastActivity:daysSinceContact,lastNoteAction:lastNote?.action,
      whitespaceGaps:whitespace.filter(w=>w.rate===0).map(w=>w.cat).slice(0,3),
    };
    generateBriefing(bp);
  }

  async function generateBriefing(d){
    const el=document.getElementById('ai-text');
    try{
      const prompt='You are an expert recruitment account manager assistant at La Fosse Associates. Based on this account data, write a concise 3-4 sentence briefing telling the account manager exactly what to do today. Be specific with numbers and names. Flowing prose, no bullet points.\n\nAccount data:\n- Health: '+d.healthScore+'/100 ('+d.healthLabel+')\n- Open jobs: '+d.openJobs+' ('+d.atRiskJobs+' at risk)'+(d.jobDetails.filter(j=>j.rag==='red').length?' — '+d.jobDetails.filter(j=>j.rag==='red').map(j=>j.title+' ('+j.daysOpen+'d, '+j.cvs+' CVs)').join(', '):'')+'\n- Contractors on-site: '+d.activeContractors+(d.endingSoon>0?' — '+d.endingSoon+' ending <30d: '+d.endingSoonNames.join(', '):'')+'\n- Revenue L12M: £'+d.revL12M.toLocaleString()+' | CY: £'+d.revCY.toLocaleString()+' vs PY: £'+d.revPY.toLocaleString()+(d.revDeltaPct!==null?' ('+d.revDeltaPct+'% YoY)':'')+'\n- Placements: '+d.totalPlacements+' | Fill rate: '+d.fillRate+'% | Avg TTF: '+(d.avgTTF||'unknown')+'d\n- Open opps: '+d.openOpps+'\n- Contacts: '+d.contacts+' total | '+d.contactsNeverContacted+' never contacted | '+d.contactsGoneCold+' cold'+(d.keyPersonRisk.length?'\n- KEY PERSON RISK: '+d.keyPersonRisk.join('; '):'')+'\n- Top consultant: '+(d.topConsultant||'unknown')+'\n- Last activity: '+(d.daysSinceLastActivity!==null?d.daysSinceLastActivity+'d ago ('+d.lastNoteAction+')':'unknown')+(d.whitespaceGaps.length?'\n- Whitespace gaps: '+d.whitespaceGaps.join(', '):'');

      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
      });
      if(!resp.ok)throw new Error('API '+resp.status);
      const result=await resp.json();
      const text=result.content?.[0]?.text||'Could not generate briefing.';
      if(el){el.style.fontStyle='normal';el.style.color='var(--text)';el.textContent=text;}
    }catch(err){
      // Fallback: generate a rule-based briefing from the data
      if(el){
        el.style.fontStyle='normal';
        el.style.color='var(--text)';
        const parts=[];
        if(d.atRiskJobs>0)parts.push(`${d.atRiskJobs} job${d.atRiskJobs>1?'s are':' is'} at risk — ${d.jobDetails.filter(j=>j.rag==='red').slice(0,2).map(j=>j.title+' ('+j.daysOpen+'d open)').join(' and ')} need immediate attention.`);
        if(d.endingSoon>0)parts.push(`${d.endingSoon} contractor${d.endingSoon>1?'s':''} ending within 30 days — ${d.endingSoonNames.slice(0,2).join(' and ')} — start extension conversations now.`);
        if(d.keyPersonRisk.length>0)parts.push(`Key person risk: ${d.keyPersonRisk.slice(0,2).join(' and ')} — high-value contacts with no recent activity.`);
        if(d.revDeltaPct!==null&&d.revDeltaPct<-10)parts.push(`Revenue is down ${Math.abs(d.revDeltaPct)}% YTD vs prior year — focus on pipeline acceleration.`);
        else if(d.revDeltaPct!==null&&d.revDeltaPct>10)parts.push(`Revenue up ${d.revDeltaPct}% YTD — strong account momentum to maintain.`);
        if(d.daysSinceLastActivity>14)parts.push(`No activity logged in ${d.daysSinceLastActivity} days — schedule an account touchpoint.`);
        if(d.contactsNeverContacted>10)parts.push(`${d.contactsNeverContacted} contacts have never been contacted — significant untapped relationship potential.`);
        el.textContent=parts.length?parts.join(' '):'Account is active with '+d.openJobs+' open jobs and '+d.activeContractors+' contractors on-site. Fill rate is '+d.fillRate+'% all time.';
      }
      console.warn('Claude API unavailable (likely CORS in iframe), using rule-based briefing.',err.message);
    }
  }

  function show(html){document.getElementById('root').innerHTML=html;}
  window.addEventListener('load',register);
</script>
</body>
</html>
