<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0d6dcd; --blue-bg: #e8f1fb;
      --green: #1a7f4b; --green-bg: #e6f4ed;
      --amber: #a35c00; --amber-bg: #fef3e2;
      --red: #b91c1c; --red-bg: #fef2f2;
      --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
      --bg: #ffffff; --surface: #f8fafc; --radius: 6px;
    }
    body { font-family: 'Source Sans 3', 'Source Sans Pro', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); }

    /* States */
    .state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 32px 20px; min-height: 180px; }
    .state-title { font-size: 13px; font-weight: 600; }
    .state-msg { font-size: 12px; color: var(--muted); text-align: center; max-width: 280px; line-height: 1.6; }
    .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry-btn { padding: 5px 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 11px; border-radius: var(--radius); cursor: pointer; }
    .retry-btn:hover { border-color: var(--blue); color: var(--blue); }
    .hidden { display: none !important; }

    /* Card */
    #card { display: none; }
    #card.visible { display: block; }

    /* Header */
    .hdr { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
    .hdr-name { font-size: 14px; font-weight: 600; }
    .hdr-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .hdr-right { text-align: right; font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .hdr-right strong { display: block; font-size: 13px; font-weight: 500; color: var(--text); }

    /* Section */
    .sec { padding: 12px 14px 14px; }
    .sec + .sec { border-top: 1px solid var(--border); }
    .sec-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; }

    /* Metric grid */
    .metrics { display: grid; gap: 8px; }
    .m3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .m4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; }
    .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .metric-value { font-size: 20px; font-weight: 600; line-height: 1.1; }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .c-amber { color: var(--amber); }
    .c-red   { color: var(--red);   }
    .c-green { color: var(--green); }

    /* Jobs table */
    .tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
    .tbl th { font-size: 10px; font-weight: 600; color: var(--muted); text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .tbl td { padding: 6px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl td.muted { color: var(--muted); }
    .tbl td.num { text-align: right; font-weight: 500; }

    /* Pills */
    .pill { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 20px; line-height: 1.6; white-space: nowrap; }
    .p-green { background: var(--green-bg); color: var(--green); }
    .p-amber { background: var(--amber-bg); color: var(--amber); }
    .p-red   { background: var(--red-bg);   color: var(--red);   }
    .p-blue  { background: var(--blue-bg);  color: var(--blue);  }
    .p-gray  { background: var(--surface);  color: var(--muted); border: 1px solid var(--border); }

    /* Bar */
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .bar-name { font-size: 12px; color: var(--muted); width: 130px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; background: var(--border); border-radius: 3px; height: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; background: var(--blue); }
    .bar-val { font-size: 12px; font-weight: 500; width: 32px; text-align: right; color: var(--muted); flex-shrink: 0; }

    /* Flag */
    .flag { display: flex; gap: 8px; padding: 6px 9px; border-radius: var(--radius); font-size: 12px; line-height: 1.4; margin-bottom: 6px; }
    .flag:last-child { margin-bottom: 0; }
    .f-red   { background: var(--red-bg);   color: #7f1d1d; border-left: 3px solid var(--red);   }
    .f-amber { background: var(--amber-bg); color: #78350f; border-left: 3px solid var(--amber); }
    .f-green { background: var(--green-bg); color: #14532d; border-left: 3px solid var(--green); }
  </style>
</head>
<body>

<div class="state" id="stateLoading"><div class="spinner"></div><div class="state-msg">Loading…</div></div>
<div class="state hidden" id="stateNoConn"><div class="state-title">Not connected</div><div class="state-msg">Open this card from a Client Corporation record.</div></div>
<div class="state hidden" id="stateError"><div class="state-title">Error</div><div class="state-msg" id="errMsg"></div><button class="retry-btn" onclick="init()">Retry</button></div>

<div id="card">
  <div class="hdr">
    <div>
      <div class="hdr-name" id="corpName">—</div>
      <div class="hdr-meta" id="corpMeta">—</div>
    </div>
    <div class="hdr-right">Open jobs<strong id="hdrJobCount">—</strong></div>
  </div>

  <!-- Pipeline summary -->
  <div class="sec">
    <div class="sec-title">Pipeline</div>
    <div class="metrics m4">
      <div class="metric"><div class="metric-label">Open jobs</div><div class="metric-value" id="mJobs">—</div><div class="metric-sub" id="mJobsSub"></div></div>
      <div class="metric"><div class="metric-label">Submissions</div><div class="metric-value" id="mSubs">—</div><div class="metric-sub" id="mSubsSub"></div></div>
      <div class="metric"><div class="metric-label">Interviews</div><div class="metric-value" id="mInterviews">—</div><div class="metric-sub">at interview stage</div></div>
      <div class="metric"><div class="metric-label">Placements</div><div class="metric-value" id="mPlacs">—</div><div class="metric-sub" id="mPlacsSub"></div></div>
    </div>
  </div>

  <!-- Jobs breakdown -->
  <div class="sec">
    <div class="sec-title">Open jobs breakdown</div>
    <div id="typeBar"></div>
    <table class="tbl">
      <thead><tr><th>Job title</th><th>Owner</th><th>Type</th><th>Days open</th><th style="text-align:right">CVs</th><th style="text-align:right">Interviews</th><th>RAG</th></tr></thead>
      <tbody id="jobRows"></tbody>
    </table>
  </div>

  <!-- Account health flags -->
  <div class="sec">
    <div class="sec-title">Account health</div>
    <div id="flags"></div>
  </div>
</div>

<script>
  const ONE_DAY = 86400000;
  const getParam = k => new URLSearchParams(location.search).get(k);
  const daysSince = ts => Math.max(0, Math.round((Date.now() - ts) / ONE_DAY));
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // ── AppBridge ──────────────────────────────────────────────────────
  let regAttempts = 0;

  function register() {
    regAttempts++;
    postRobot.sendToParent('register', { title: 'Account Management' }, { timeout: 6000 })
      .then(() => onRegistered(true))
      .catch(() => {
        if (regAttempts < 5) setTimeout(register, 600);
        else onRegistered(false);
      });
  }

  function bhGet(url) {
    return postRobot.sendToParent('httpGET', { relativeURL: url }, { timeout: 20000 })
      .then(evt => {
        const p = evt.data;
        if (!p) throw new Error('Empty response');
        if (p.error) throw new Error(JSON.stringify(p.error));
        return p.data;
      });
  }

  function bhPost(url, body) {
    return postRobot.sendToParent('httpPOST', { relativeURL: url, data: body }, { timeout: 20000 })
      .then(evt => {
        const p = evt.data;
        if (!p) throw new Error('Empty response');
        if (p.error) throw new Error(JSON.stringify(p.error));
        return p.data;
      });
  }

  // ── API — only patterns confirmed working from the jobs card ──────
  async function fetchCorp(id) {
    // Bare minimum fields only
    const res = await bhGet(`entity/ClientCorporation/${id}?fields=id,name,owner(id,firstName,lastName)&meta=off`);
    return res.data || res;
  }

  async function fetchOpenJobs(corpId) {
    // Confirmed working: search/JobOrder via httpPOST with nested submission/placement counts
    const res = await bhPost('search/JobOrder', {
      query: `clientCorporation.id:${corpId} AND isDeleted:false AND isOpen:true`,
      fields: [
        'id','title','status','employmentType','dateAdded',
        'owner(id,firstName,lastName)',
        'submissions[100](id,dateAdded,status)',
        'placements[50](id,dateAdded,status)',
        'categories(name)'
      ].join(','),
      count: 200,
      start: 0,
      sort: '-dateAdded'
    });
    return res.data || [];
  }

  async function fetchAllJobs(corpId) {
    // For fill rate — just IDs and placement count
    const res = await bhPost('search/JobOrder', {
      query: `clientCorporation.id:${corpId} AND isDeleted:false`,
      fields: 'id,status,placements[1](id)',
      count: 500,
      start: 0
    });
    return res.data || [];
  }

  // ── Analysis ──────────────────────────────────────────────────────
  function analyse(corp, openJobs, allJobs) {
    const now = Date.now();

    // Per-job metrics
    const jobRows = openJobs.map(j => {
      const subs = j.submissions?.data || [];
      const placs = j.placements?.data || [];
      const daysOpen = daysSince(j.dateAdded);

      const interviews = subs.filter(s => {
        const st = (s.status||'').toLowerCase();
        return st.includes('interview') || st.includes('1st') || st.includes('2nd') || st.includes('3rd') || st.includes('shortlist');
      }).length;

      const daysSinceSub = subs.length
        ? daysSince(Math.max(...subs.map(s => s.dateAdded)))
        : daysOpen;

      let rag, ragClass;
      if (placs.length > 0) {
        rag = 'Filled'; ragClass = 'p-blue';
      } else if (daysOpen > 60 || (daysSinceSub > 14 && subs.length > 0)) {
        rag = 'At risk'; ragClass = 'p-red';
      } else if (daysOpen > 30 || daysSinceSub > 7) {
        rag = 'Review'; ragClass = 'p-amber';
      } else {
        rag = 'On track'; ragClass = 'p-green';
      }

      return {
        id: j.id,
        title: j.title || `Job #${j.id}`,
        owner: j.owner ? `${j.owner.firstName} ${j.owner.lastName}` : '—',
        type: j.employmentType || '—',
        daysOpen,
        subsCount: subs.length,
        interviews,
        placsCount: placs.length,
        rag, ragClass,
        categories: j.categories?.data || [],
      };
    });

    // Totals
    const totalSubs      = jobRows.reduce((s,j) => s + j.subsCount, 0);
    const totalInterviews= jobRows.reduce((s,j) => s + j.interviews, 0);
    const totalPlacs     = jobRows.reduce((s,j) => s + j.placsCount, 0);
    const openPerm       = jobRows.filter(j => (j.type||'').toLowerCase().includes('perm') || (j.type||'').toLowerCase().includes('direct')).length;
    const openContract   = jobRows.length - openPerm;

    // Type breakdown bars
    const typeCounts = {};
    jobRows.forEach(j => { typeCounts[j.type] = (typeCounts[j.type]||0) + 1; });
    const typeBreakdown = Object.entries(typeCounts).sort((a,b) => b[1]-a[1]);

    // Fill rate (all-time)
    const totalJobCount  = allJobs.length;
    const filledJobCount = allJobs.filter(j => (j.placements?.data||[]).length > 0).length;
    const fillRate = totalJobCount > 0 ? Math.round(filledJobCount / totalJobCount * 100) : null;

    // Flags
    const flags = [];
    const atRisk = jobRows.filter(j => j.ragClass === 'p-red');
    atRisk.forEach(j => flags.push({ type:'red', msg:`${j.title} — ${j.daysOpen} days open, pipeline stalling` }));

    const stalledPipeline = jobRows.filter(j => j.subsCount === 0 && j.daysOpen > 7);
    stalledPipeline.forEach(j => {
      if (!atRisk.find(r => r.id === j.id))
        flags.push({ type:'amber', msg:`${j.title} — no CVs sent yet (${j.daysOpen} days open)` });
    });

    if (fillRate !== null && fillRate < 30 && totalJobCount > 5)
      flags.push({ type:'amber', msg:`${fillRate}% historical fill rate (${filledJobCount}/${totalJobCount} jobs) — review brief quality` });

    if (flags.length === 0)
      flags.push({ type:'green', msg:'No issues flagged — all jobs active' });

    return { corp, jobRows, totalSubs, totalInterviews, totalPlacs, openPerm, openContract, typeBreakdown, fillRate, filledJobCount, totalJobCount };
  }

  // ── Render ────────────────────────────────────────────────────────
  function render(d) {
    const owner = d.corp.owner ? `${d.corp.owner.firstName} ${d.corp.owner.lastName}` : '—';

    document.getElementById('corpName').textContent = d.corp.name || `Corp #${d.corp.id}`;
    document.getElementById('corpMeta').textContent = `Owner: ${owner}`;
    document.getElementById('hdrJobCount').textContent = d.jobRows.length;

    // Pipeline metrics
    document.getElementById('mJobs').textContent       = d.jobRows.length;
    document.getElementById('mJobsSub').textContent    = `${d.openPerm} perm · ${d.openContract} contract`;
    document.getElementById('mSubs').textContent       = d.totalSubs;
    document.getElementById('mSubsSub').textContent    = `across all open jobs`;
    document.getElementById('mInterviews').textContent = d.totalInterviews;
    document.getElementById('mPlacs').textContent      = d.totalPlacs;
    document.getElementById('mPlacsSub').textContent   = d.fillRate !== null ? `${d.fillRate}% all-time fill rate` : '';

    // Type bars
    const maxType = d.typeBreakdown.length ? d.typeBreakdown[0][1] : 1;
    document.getElementById('typeBar').innerHTML = d.typeBreakdown.map(([name, count]) => `
      <div class="bar-row">
        <div class="bar-name">${esc(name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxType*100)}%"></div></div>
        <div class="bar-val">${count}</div>
      </div>`).join('');

    // Jobs table
    document.getElementById('jobRows').innerHTML = d.jobRows.length
      ? d.jobRows.map(j => `
        <tr>
          <td>${esc(j.title)}</td>
          <td class="muted">${esc(j.owner)}</td>
          <td class="muted">${esc(j.type)}</td>
          <td class="muted ${j.daysOpen > 60 ? 'c-red' : j.daysOpen > 30 ? 'c-amber' : ''}">${j.daysOpen}d</td>
          <td class="num">${j.subsCount}</td>
          <td class="num">${j.interviews}</td>
          <td><span class="pill ${j.ragClass}">${esc(j.rag)}</span></td>
        </tr>`).join('')
      : `<tr><td colspan="7" style="text-align:center;padding:14px;color:var(--muted);">No open jobs</td></tr>`;

    // Flags
    document.getElementById('flags').innerHTML = d.flags.map(f => `
      <div class="flag f-${f.type}">
        <span>${f.type==='red'?'⚠':f.type==='green'?'✓':'⏱'}</span>
        <span>${esc(f.msg)}</span>
      </div>`).join('');

    setState(null);
    document.getElementById('card').classList.add('visible');
  }

  // ── State ─────────────────────────────────────────────────────────
  function setState(id) {
    ['stateLoading','stateNoConn','stateError'].forEach(s =>
      document.getElementById(s).classList.toggle('hidden', s !== id)
    );
    if (!id) document.getElementById('stateLoading').classList.add('hidden');
  }

  // ── Boot ──────────────────────────────────────────────────────────
  async function onRegistered(ok) {
    const entityId = parseInt(getParam('EntityID'), 10);
    const userId   = parseInt(getParam('UserID'),   10);
    const corpId   = parseInt(getParam('CorporationID'), 10);
    const plId     = parseInt(getParam('PrivateLabelID'), 10);

    if (!ok || !entityId || !userId || !corpId || !plId) {
      setState('stateNoConn'); return;
    }

    try {
      const [corp, openJobs, allJobs] = await Promise.all([
        fetchCorp(entityId),
        fetchOpenJobs(entityId),
        fetchAllJobs(entityId),
      ]);
      const data = analyse(corp, openJobs, allJobs);
      render(data);
    } catch (err) {
      console.error('AccountCard:', err);
      setState('stateError');
      document.getElementById('errMsg').textContent = err.message || String(err);
    }
  }

  async function init() {
    setState('stateLoading');
    document.getElementById('card').classList.remove('visible');
    regAttempts = 0;
    register();
  }

  window.addEventListener('load', init);
</script>
</body>
</html>
