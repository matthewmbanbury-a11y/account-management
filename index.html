<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Account Management</title>
  <script src="//cdn.rawgit.com/krakenjs/post-robot/7da06445/dist/post-robot.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--border:#21262d;
      --text:#e6edf3;--muted:#8b949e;
      --blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f78166;--purple:#bc8cff;
    }
    html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
    .hdr-title{font-size:13px;font-weight:600}.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
    .badges{display:flex;gap:4px;flex-wrap:wrap}
    .badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
    .b-blue{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
    .b-green{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
    .b-yellow{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.3)}
    .b-red{background:rgba(247,129,102,.15);color:var(--red);border:1px solid rgba(247,129,102,.3)}
    .b-purple{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.3)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
    .rev-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
    .stat{padding:9px 12px;border-right:1px solid var(--border)}.stat:last-child{border-right:none}
    .stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
    .stat-value{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;line-height:1}
    .stat-sub{font-size:10px;color:var(--muted);margin-top:3px}
    .c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-purple{color:var(--purple)}
    .insights{border-bottom:1px solid var(--border);padding:8px 14px;display:flex;flex-direction:column;gap:4px}
    .insight{display:flex;align-items:flex-start;gap:7px;font-size:11px;line-height:1.4}
    .insight-icon{flex-shrink:0;margin-top:1px}
    .insight.warn{color:var(--yellow)}.insight.alert{color:var(--red)}.insight.good{color:var(--green)}.insight.info{color:var(--muted)}
    .sec{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:7px 14px 3px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
    .sec span{font-family:'DM Mono',monospace}
    .row{display:flex;align-items:center;gap:9px;padding:7px 14px;border-bottom:1px solid var(--border)}
    .row:last-child{border-bottom:none}
    .rag{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .rag-green{background:var(--green);box-shadow:0 0 5px rgba(63,185,80,.5)}
    .rag-yellow{background:var(--yellow);box-shadow:0 0 5px rgba(210,153,34,.5)}
    .rag-red{background:var(--red);box-shadow:0 0 5px rgba(247,129,102,.5)}
    .rag-gray{background:var(--border)}.rag-blue{background:var(--blue);box-shadow:0 0 5px rgba(88,166,255,.4)}
    .row-info{flex:1;min-width:0}
    .row-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-meta{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
    .nums{display:flex;gap:10px}
    .num{text-align:right}
    .num-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
    .num-lbl{font-size:9px;color:var(--muted)}
    .pill{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:12px;flex-shrink:0;white-space:nowrap}
    .p-perm{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
    .p-contract{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
    .p-sow{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.3)}
    .p-red{background:rgba(247,129,102,.15);color:var(--red);border:1px solid rgba(247,129,102,.3)}
    .p-yellow{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.3)}
    .p-gray{background:rgba(139,148,158,.1);color:var(--muted);border:1px solid var(--border)}
    .p-purple{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.3)}
    .p-green{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
    .avatar{width:24px;height:24px;border-radius:50%;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--blue);flex-shrink:0}
    .contact-pills{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
    .empty{padding:10px 14px;font-size:11px;color:var(--muted)}
    .state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:32px 20px}
    .state-msg{font-size:11px;color:var(--muted)}
    .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"><div class="state"><div class="spinner"></div><div class="state-msg">Loading account data…</div></div></div>
<script>
  const getParam = k => new URLSearchParams(location.search).get(k);
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const ONE_DAY = 86400000;
  const now = Date.now();
  const L12M = now - 365*ONE_DAY;
  const fmtDate = ts => ts?new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}):'—';
  const daysAgo  = ts => Math.round((now-ts)/ONE_DAY);
  const daysFrom = ts => Math.round((ts-now)/ONE_DAY);
  const initials = (f,l) => ((f||'')[0]||'').toUpperCase()+((l||'')[0]||'').toUpperCase();
  const workDays = (a,b) => { let d=0,t=Math.min(a,b);const e=Math.max(a,b);while(t<e){const w=new Date(t).getDay();if(w>0&&w<6)d++;t+=ONE_DAY;}return d; };
  const fmtGBP  = n => n>=1000000?'£'+(n/1000000).toFixed(1)+'m':n>=1000?'£'+Math.round(n/1000)+'k':'£'+Math.round(n);
  const bhUrl   = () => { const u=getParam('currentBullhornUrl'); return u?new URL(u).origin:'https://app.bullhornstaffing.com'; };
  const recUrl  = (type,id) => `${bhUrl()}/content/record/${type}/${id}/overview`;

  let attempts=0;
  function register(){
    attempts++;
    postRobot.sendToParent('register',{title:'Account Management'},{timeout:5000})
      .then(()=>run())
      .catch(()=>{ if(attempts<4) setTimeout(register,500); else show('<div class="state"><div class="state-msg">No AppBridge</div></div>'); });
  }

  async function post(url,data){
    const evt=await postRobot.sendToParent('httpPOST',{relativeURL:url,data},{timeout:25000});
    return evt.data?.data?.data||[];
  }
  async function get(url){
    const evt=await postRobot.sendToParent('httpGET',{relativeURL:url},{timeout:20000});
    return evt.data?.data||{};
  }

  async function run(){
    const entityId=parseInt(getParam('EntityID'),10);
    try {
      // Wave 1 — all parallel
      const [allJobs,openJobs,contacts,notesRaw,opps]=await Promise.all([
        post('search/JobOrder',{
          query:`clientCorporation.id:${entityId} AND isDeleted:false`,
          fields:'id,placements[50](id),clientContact(id,firstName,lastName)',
          count:500,start:0
        }),
        post('search/JobOrder',{
          query:`clientCorporation.id:${entityId} AND isDeleted:false AND isOpen:true`,
          fields:'id,title,status,employmentType,dateAdded,owner(id,firstName,lastName),clientContact(id,firstName,lastName),submissions[100](dateAdded,status),placements[10](dateAdded)',
          count:200,start:0,sort:'-dateAdded'
        }),
        post('search/ClientContact',{
          query:`clientCorporation.id:${entityId} AND isDeleted:false`,
          fields:'id,firstName,lastName,email,occupation,dateLastModified',
          count:200,start:0,sort:'-dateLastModified'
        }),
        get(`allCorpNotes?clientCorpId=${entityId}&fields=id,dateAdded,action,commentingPerson(id,firstName,lastName),personReference(id,firstName,lastName),comments&count=200&start=0&sort=-dateAdded`),
        post('search/Opportunity',{
          query:`clientCorporation.id:${entityId} AND isDeleted:false`,
          fields:'id,title,status,dateAdded,clientContact(id,firstName,lastName),owner(id,firstName,lastName)',
          count:200,start:0,sort:'-dateAdded'
        })
      ]);

      const notes=notesRaw.data||[];

      // Build per-contact last activity map from notes
      const contactLastActivity={};
      notes.forEach(n=>{
        const pr=n.personReference;
        if(pr&&pr._subtype==='ClientContact'){
          if(!contactLastActivity[pr.id]||n.dateAdded>contactLastActivity[pr.id].date)
            contactLastActivity[pr.id]={date:n.dateAdded,action:n.action};
        }
      });

      // Collect placement IDs
      const placIds=[];
      allJobs.forEach(j=>(j.placements?.data||[]).forEach(p=>{ if(!placIds.includes(p.id)) placIds.push(p.id); }));

      // Wave 2 — placements batch
      let placements=[];
      if(placIds.length){
        const batches=[];
        for(let i=0;i<Math.min(placIds.length,200);i+=50)
          batches.push(placIds.slice(i,i+50));
        const res=await Promise.all(batches.map(b=>post('search/Placement',{
          query:b.map(id=>`id:${id}`).join(' OR '),
          fields:'id,status,dateBegin,dateEnd,employmentType,clientBillRate,hoursPerDay,fee,flatFee,candidate(id,firstName,lastName),jobOrder(id,title),owner(id,firstName,lastName)',
          count:50,start:0
        })));
        placements=res.flat();
      }

      render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity);
    } catch(err){
      show(`<div class="state"><div class="state-msg">Error: ${esc(err.message)}</div></div>`);
      console.error(err);
    }
  }

  function placRevenue(p){
    if(p.fee&&p.fee>0) return p.fee;
    if(p.flatFee&&p.flatFee>0) return p.flatFee;
    if(p.clientBillRate&&p.dateBegin&&p.dateEnd){
      return p.clientBillRate*(p.hoursPerDay||8)/8*workDays(p.dateBegin,p.dateEnd);
    }
    return 0;
  }

  function jobRag(j){
    const subs=j.submissions?.data||[];
    const placs=j.placements?.data||[];
    const daysOpen=Math.round((now-j.dateAdded)/ONE_DAY);
    const subDates=subs.map(s=>s.dateAdded).sort((a,b)=>b-a);
    const daysSinceSub=subDates.length?Math.round((now-subDates[0])/ONE_DAY):daysOpen;
    const interviews=subs.filter(s=>/interview|1st|2nd|3rd|shortlist/i.test(s.status||'')).length;
    let rag='green';
    if(placs.length) rag='green';
    else if(daysOpen>60||(daysSinceSub>14&&subs.length)) rag='red';
    else if(daysOpen>30||daysSinceSub>7) rag='yellow';
    return {daysOpen,subs:subs.length,interviews,placs:placs.length,daysSinceSub,rag};
  }

  function typePill(t){const tl=(t||'').toLowerCase();if(tl.includes('perm')||tl.includes('direct'))return 'p-perm';if(tl==='sow')return 'p-sow';return 'p-contract';}
  function placStatusPill(p){
    const st=(p.status||'').toLowerCase();
    const left=p.dateEnd?daysFrom(p.dateEnd):null;
    if(st==='approved'||st==='extension'){
      if(left===null)return{cls:'p-gray',label:'Active'};
      if(left<0)return{cls:'p-red',label:'Ended'};
      if(left<=30)return{cls:'p-yellow',label:`${left}d left`};
      return{cls:'p-contract',label:`${left}d left`};
    }
    if(st==='terminated')return{cls:'p-red',label:'Terminated'};
    return{cls:'p-gray',label:p.status||'—'};
  }
  function oppStatusPill(s){const sl=(s||'').toLowerCase();if(sl==='won')return 'p-perm';if(sl==='lost')return 'p-red';if(sl.includes('discovery')||sl.includes('proposal'))return 'p-yellow';return 'p-gray';}

  // Contact activity RAG
  function contactRag(c){
    if(!c.lastActivity) return 'rag-red';
    const d=daysAgo(c.lastActivity.date);
    if(d<=14) return 'rag-green';
    if(d<=60) return 'rag-yellow';
    return 'rag-red';
  }

  function render(entityId,openJobs,allJobs,placements,contacts,notes,opps,contactLastActivity){
    const jm=openJobs.map(j=>({j,m:jobRag(j)}));

    // Revenue
    const revAll =placements.reduce((s,p)=>s+placRevenue(p),0);
    const revL12M=placements.filter(p=>p.dateBegin&&p.dateBegin>=L12M).reduce((s,p)=>s+placRevenue(p),0);
    const activePlacs=placements.filter(p=>{const st=(p.status||'').toLowerCase();return(st==='approved'||st==='extension')&&p.dateEnd&&p.dateEnd>now;});
    const endingSoon=activePlacs.filter(p=>daysFrom(p.dateEnd)<=30);
    const totalPlacs=placements.length;
    const fillRate=allJobs.length>0?Math.round(totalPlacs/allJobs.length*100):0;

    // Contact intelligence
    const contactJobCount={};
    allJobs.forEach(j=>{const cc=j.clientContact;if(cc?.id)contactJobCount[cc.id]=(contactJobCount[cc.id]||0)+1;});
    const enrichedContacts=contacts.map(c=>({
      ...c,
      jobsRaised:contactJobCount[c.id]||0,
      lastActivity:contactLastActivity[c.id]||null
    })).sort((a,b)=>{
      // Sort: has jobs first, then by recency of last activity
      if(b.jobsRaised!==a.jobsRaised) return b.jobsRaised-a.jobsRaised;
      const aDate=a.lastActivity?a.lastActivity.date:0;
      const bDate=b.lastActivity?b.lastActivity.date:0;
      return bDate-aDate;
    });

    const contactsWithJobs=enrichedContacts.filter(c=>c.jobsRaised>0);
    const contactsNeverContacted=enrichedContacts.filter(c=>!c.lastActivity);
    const contactsGoneCold=enrichedContacts.filter(c=>c.lastActivity&&daysAgo(c.lastActivity.date)>60);

    // Opps
    const openOpps=opps.filter(o=>!['won','lost'].includes((o.status||'').toLowerCase()));
    const wonOpps=opps.filter(o=>(o.status||'').toLowerCase()==='won');

    // Pipeline
    const totSubs=jm.reduce((s,x)=>s+x.m.subs,0);
    const totInt=jm.reduce((s,x)=>s+x.m.interviews,0);
    const atRisk=jm.filter(x=>x.m.rag==='red').length;
    const lastNote=notes[0]||null;
    const daysSinceContact=lastNote?daysAgo(lastNote.dateAdded):null;

    // Insights
    const insights=[];
    if(atRisk>0) insights.push({type:'alert',icon:'🔴',msg:`${atRisk} job${atRisk>1?'s':''} at risk — stalled pipeline or overdue`});
    jm.forEach(({j,m})=>{
      if(m.subs===0&&m.daysOpen>7) insights.push({type:'warn',icon:'⏸',msg:`${j.title} — ${m.daysOpen}d open, no CVs sent yet`});
      else if(m.subs>0&&m.daysSinceSub>10&&!m.placs) insights.push({type:'warn',icon:'📭',msg:`${j.title} — no CV sent in ${m.daysSinceSub} days`});
    });
    if(endingSoon.length>0) insights.push({type:'warn',icon:'⏰',msg:`${endingSoon.length} contractor${endingSoon.length>1?'s':''} ending within 30 days — extension conversation needed`});
    if(contactsNeverContacted.length>0) insights.push({type:'warn',icon:'👤',msg:`${contactsNeverContacted.length} contacts never contacted — untapped relationships`});
    if(contactsGoneCold.length>0) insights.push({type:'warn',icon:'🥶',msg:`${contactsGoneCold.length} contacts gone cold — no activity in 60+ days`});
    if(daysSinceContact!==null&&daysSinceContact>14) insights.push({type:'warn',icon:'📞',msg:`Last account activity ${daysSinceContact} days ago — needs a touchpoint`});
    else if(daysSinceContact!==null&&daysSinceContact<=3) insights.push({type:'good',icon:'✅',msg:`Active account — last contact ${daysSinceContact} day${daysSinceContact===1?'':'s'} ago`});
    if(openOpps.length>0) insights.push({type:'info',icon:'🎯',msg:`${openOpps.length} open opportunit${openOpps.length>1?'ies':'y'} in pipeline`});
    const owners=[...new Set(jm.map(x=>x.j.owner?`${x.j.owner.firstName} ${x.j.owner.lastName}`:null).filter(Boolean))];
    if(owners.length===1&&jm.length>2) insights.push({type:'warn',icon:'⚠',msg:`Single point of failure — all ${jm.length} open jobs owned by ${owners[0]}`});
    if(fillRate>0) insights.push({type:'info',icon:'📊',msg:`${fillRate}% all-time fill rate — ${totalPlacs} placements from ${allJobs.length} jobs`});
    if(insights.length===0) insights.push({type:'good',icon:'✅',msg:'No issues flagged — account looks healthy'});

    const base=bhUrl();

    // ── HTML ──
    const statsHtml=`
      <div class="stats">
        <div class="stat"><div class="stat-label">Open Jobs</div><div class="stat-value ${atRisk?'c-yellow':''}">${openJobs.length}</div><div class="stat-sub">${atRisk?`<span class="c-red">${atRisk} at risk</span>`:'all active'}</div></div>
        <div class="stat"><div class="stat-label">CVs / Interviews</div><div class="stat-value">${totSubs}</div><div class="stat-sub">${totInt} at interview</div></div>
        <div class="stat"><div class="stat-label">Contractors On-site</div><div class="stat-value ${activePlacs.length?'c-green':'c-yellow'}">${activePlacs.length}</div><div class="stat-sub">${endingSoon.length?`<span class="c-red">${endingSoon.length} ending soon</span>`:totalPlacs+' all time'}</div></div>
        <div class="stat"><div class="stat-label">Open Opportunities</div><div class="stat-value c-purple">${openOpps.length}</div><div class="stat-sub">${wonOpps.length} won all time</div></div>
      </div>`;

    const revHtml=`
      <div class="rev-stats">
        <div class="stat"><div class="stat-label">Revenue L12M</div><div class="stat-value c-green">${fmtGBP(revL12M)}</div><div class="stat-sub">contract bill rate basis</div></div>
        <div class="stat"><div class="stat-label">Revenue Lifetime</div><div class="stat-value">${fmtGBP(revAll)}</div><div class="stat-sub">${totalPlacs} placements</div></div>
        <div class="stat"><div class="stat-label">Fill Rate</div><div class="stat-value ${fillRate>=50?'c-green':fillRate>=30?'c-yellow':'c-red'}">${fillRate}%</div><div class="stat-sub">${totalPlacs} of ${allJobs.length} jobs</div></div>
      </div>`;

    const insightsHtml=`<div class="insights">${insights.map(i=>`<div class="insight ${i.type}"><span class="insight-icon">${i.icon}</span><span>${esc(i.msg)}</span></div>`).join('')}</div>`;

    const jobRows=jm.length?jm.map(({j,m})=>{
      const owner=j.owner?`${j.owner.firstName} ${j.owner.lastName}`:'—';
      const cc=j.clientContact?`${j.clientContact.firstName} ${j.clientContact.lastName}`:'no contact';
      return `<div class="row">
        <div class="rag rag-${m.rag}"></div>
        <div class="row-info">
          <div class="row-title"><a href="${recUrl('JobOrder',j.id)}" target="_blank" style="color:var(--text);text-decoration:none">${esc(j.title||'Untitled')}</a></div>
          <div class="row-meta">${esc(owner)} · via ${esc(cc)} · ${m.daysOpen}d open${m.subs>0?' · last CV '+m.daysSinceSub+'d ago':' · no CVs'}</div>
        </div>
        <div class="row-right">
          <div class="nums">
            <div class="num"><div class="num-val ${m.subs===0?'c-red':''}">${m.subs}</div><div class="num-lbl">CVs</div></div>
            <div class="num"><div class="num-val">${m.interviews}</div><div class="num-lbl">Intrvw</div></div>
            <div class="num"><div class="num-val ${m.placs?'c-green':''}">${m.placs}</div><div class="num-lbl">Placed</div></div>
          </div>
          <span class="pill ${typePill(j.employmentType)}">${esc(j.employmentType||'—')}</span>
        </div>
      </div>`;
    }).join(''):'<div class="empty">No open jobs</div>';

    const contractorRows=activePlacs.length?activePlacs.sort((a,b)=>a.dateEnd-b.dateEnd).slice(0,10).map(p=>{
      const name=p.candidate?`${p.candidate.firstName} ${p.candidate.lastName}`:'—';
      const role=p.jobOrder?.title||'—';
      const owner=p.owner?`${p.owner.firstName} ${p.owner.lastName}`:'—';
      const pp=placStatusPill(p);
      const left=p.dateEnd?daysFrom(p.dateEnd):null;
      const ragC=left===null?'rag-gray':left<0?'rag-red':left<=30?'rag-yellow':'rag-green';
      const candidateId=p.candidate?.id;
      return `<div class="row">
        <div class="rag ${ragC}"></div>
        <div class="row-info">
          <div class="row-title">${candidateId?`<a href="${recUrl('Candidate',candidateId)}" target="_blank" style="color:var(--text);text-decoration:none">${esc(name)}</a>`:esc(name)}</div>
          <div class="row-meta">${esc(role)} · ${esc(owner)} · ${p.clientBillRate?'£'+p.clientBillRate+'/day':''} · ends ${fmtDate(p.dateEnd)}</div>
        </div>
        <div class="row-right">
          <span class="pill ${typePill(p.employmentType)}">${esc(p.employmentType||'—')}</span>
          <span class="pill ${pp.cls}">${pp.label}</span>
        </div>
      </div>`;
    }).join(''):'<div class="empty">No active contractors</div>';

    const contactRows=enrichedContacts.slice(0,10).map(c=>{
      const name=`${(c.firstName||'').trim()} ${(c.lastName||'').trim()}`.trim();
      const ragC=contactRag(c);
      const lastAct=c.lastActivity;
      const neverContacted=!lastAct;
      const cold=lastAct&&daysAgo(lastAct.date)>60;
      return `<div class="row">
        <div class="rag ${ragC}"></div>
        <div class="avatar">${initials(c.firstName,c.lastName)}</div>
        <div class="row-info">
          <div class="row-title"><a href="${recUrl('ClientContact',c.id)}" target="_blank" style="color:var(--text);text-decoration:none">${esc(name)}</a>${c.jobsRaised>0?` <span style="color:var(--green);font-size:10px">· ${c.jobsRaised} job${c.jobsRaised>1?'s':''}</span>`:''}</div>
          <div class="row-meta">${esc(c.occupation||'—')}${c.email?' · '+esc(c.email):''}</div>
        </div>
        <div class="contact-pills">
          <span class="pill ${c.jobsRaised>0?'p-green':'p-gray'}">${c.jobsRaised>0?c.jobsRaised+' jobs raised':'no jobs'}</span>
          ${neverContacted?'<span class="pill p-red" style="font-size:8px">never contacted</span>':cold?`<span class="pill p-yellow" style="font-size:8px">cold · ${daysAgo(lastAct.date)}d ago</span>`:`<span class="pill p-gray" style="font-size:8px">${esc(lastAct.action||'note')} · ${daysAgo(lastAct.date)}d ago</span>`}
        </div>
      </div>`;
    }).join('')||'<div class="empty">No contacts</div>';

    const oppRows=openOpps.slice(0,6).map(o=>{
      const cc=o.clientContact?`${o.clientContact.firstName} ${o.clientContact.lastName}`:'—';
      const owner=o.owner?`${o.owner.firstName} ${o.owner.lastName}`:'—';
      return `<div class="row">
        <div class="rag rag-blue"></div>
        <div class="row-info">
          <div class="row-title"><a href="${recUrl('Opportunity',o.id)}" target="_blank" style="color:var(--text);text-decoration:none">${esc(o.title||'Untitled')}</a></div>
          <div class="row-meta">${esc(owner)} · via ${esc(cc)} · added ${fmtDate(o.dateAdded)}</div>
        </div>
        <span class="pill ${oppStatusPill(o.status)}">${esc(o.status||'—')}</span>
      </div>`;
    }).join('')||'<div class="empty">No open opportunities</div>';

    const noteRows=notes.slice(0,5).map(n=>{
      const who=n.commentingPerson?`${n.commentingPerson.firstName} ${n.commentingPerson.lastName}`:'—';
      const contact=n.personReference?`${n.personReference.firstName} ${n.personReference.lastName}`:'—';
      const body=(n.comments||'').replace(/<[^>]+>/g,'').trim().substring(0,80);
      return `<div class="row">
        <div class="rag rag-gray"></div>
        <div class="row-info">
          <div class="row-title">${esc(n.action||'Note')} · <span style="font-weight:400;color:var(--muted)">${esc(who)} → ${esc(contact)}</span></div>
          <div class="row-meta">${fmtDate(n.dateAdded)}${body?' — '+esc(body):''}</div>
        </div>
      </div>`;
    }).join('')||'<div class="empty">No notes</div>';

    show(`
      <div class="hdr">
        <div>
          <div class="hdr-title">Account Management</div>
          <div class="hdr-sub">${openJobs.length} open · ${activePlacs.length} on-site · ${contacts.length} contacts · ${openOpps.length} opps · last activity ${daysSinceContact!==null?daysSinceContact+'d ago':'unknown'}</div>
        </div>
        <div class="badges">
          ${openJobs.length?`<span class="badge b-blue">${openJobs.length} open</span>`:''}
          ${atRisk?`<span class="badge b-red">${atRisk} at risk</span>`:''}
          ${activePlacs.length?`<span class="badge b-green">${activePlacs.length} on-site</span>`:''}
          ${endingSoon.length?`<span class="badge b-yellow">${endingSoon.length} ending soon</span>`:''}
          ${openOpps.length?`<span class="badge b-purple">${openOpps.length} opps</span>`:''}
        </div>
      </div>
      ${statsHtml}
      ${revHtml}
      ${insightsHtml}
      <div class="sec">Open Jobs <span>${openJobs.length}</span></div>
      ${jobRows}
      <div class="sec">Active Contractors <span>${activePlacs.length} active · ${totalPlacs} all time</span></div>
      ${contractorRows}
      <div class="sec">Open Opportunities <span>${openOpps.length} open · ${opps.length} total</span></div>
      ${oppRows}
      <div class="sec">Contacts <span>${contactsWithJobs.length} raised jobs · ${contactsNeverContacted.length} never contacted · ${contactsGoneCold.length} cold</span></div>
      ${contactRows}
      <div class="sec">Recent Activity <span>${notes.length} notes loaded</span></div>
      ${noteRows}
    `);
  }

  function show(html){document.getElementById('root').innerHTML=html;}
  window.addEventListener('load',register);
</script>
</body>
</html>
